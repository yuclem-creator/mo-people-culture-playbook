<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mandarin Oriental · Playbook Library</title>
<link rel="icon" href="data:," />
<style>
/* ============================================================
   MANDARIN ORIENTAL — PLAYBOOK LIBRARY HUB
   Quiet-luxury palette shared with the playbook viewer.
   ============================================================ */
:root {
  --paper: #FFFFFF;
  --paper-warm: #FAF9F6;
  --paper-tint: #F5F3EE;
  --ink: #0d0b08;
  --ink-body: #262220;
  --ink-mute: #6b625a;
  --ink-fade: #a89f92;
  --rule: #E5E2DA;
  --gold: #B59060;
  --gold-deep: #8f6d3f;
  --gold-hair: #C9A879;
  --celadon: #7C917F;
  --shadow-card: 0 1px 2px rgba(13,11,8,0.03), 0 12px 32px rgba(13,11,8,0.06);
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--paper-warm);
  color: var(--ink-body);
  font-family: 'Avenir Next LT Pro', system-ui, sans-serif;
  font-size: 15px; line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; }

/* ---- top bar ------------------------------------------------ */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px clamp(20px, 5vw, 64px);
  border-bottom: 1px solid var(--rule);
  background: var(--paper);
}
.wordmark {
  font-size: 13px; letter-spacing: .34em; text-transform: uppercase;
  color: var(--ink); text-decoration: none;
}
.wordmark small { display: block; font-size: 9px; letter-spacing: .3em; color: var(--ink-fade); margin-top: 3px; }
.studio-link {
  font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--gold-deep); text-decoration: none;
  border: 1px solid var(--gold-hair); padding: 9px 18px; border-radius: 2px;
  transition: background .2s, color .2s;
  white-space: nowrap;
}
.studio-link:hover { background: var(--gold); color: #fff; border-color: var(--gold); }

/* ---- hero ---------------------------------------------------- */
.hero { padding: clamp(48px, 8vw, 96px) clamp(20px, 5vw, 64px) clamp(28px, 4vw, 44px); max-width: 1200px; margin: 0 auto; }
.hero .eyebrow { font-size: 11px; letter-spacing: .3em; text-transform: uppercase; color: var(--gold); margin-bottom: 18px; }
.hero h1 {
  font-family: Georgia, 'Times New Roman', serif; font-weight: 400;
  font-size: clamp(34px, 5.4vw, 58px); line-height: 1.12;
  color: var(--ink); margin: 0 0 16px; letter-spacing: .01em;
}
.hero p { max-width: 560px; color: var(--ink-mute); margin: 0 0 8px; font-size: 15px; }
.hero .hairline { width: 72px; height: 1px; background: var(--gold-hair); margin-top: 28px; }

/* ---- search -------------------------------------------------- */
.toolbar { max-width: 1200px; margin: 0 auto; padding: 0 clamp(20px, 5vw, 64px) 8px; }
.search {
  width: 100%; max-width: 420px;
  border: 1px solid var(--rule); background: var(--paper);
  padding: 12px 16px; font: inherit; font-size: 14px; color: var(--ink-body);
  border-radius: 2px; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.search:focus { border-color: var(--gold-hair); box-shadow: 0 0 0 3px rgba(181,144,96,.12); }
.search::placeholder { color: var(--ink-fade); }

/* ---- breadcrumb ---------------------------------------------- */
.crumb { max-width: 1200px; margin: 0 auto; padding: 18px clamp(20px, 5vw, 64px) 0; font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-fade); }
.crumb button {
  background: none; border: 0; padding: 0; font: inherit; letter-spacing: inherit;
  text-transform: inherit; color: var(--gold-deep); cursor: pointer;
}
.crumb button:hover { text-decoration: underline; }
.crumb .sep { margin: 0 10px; color: var(--rule); }

/* ---- folder grid ---------------------------------------------- */
.grid {
  max-width: 1200px; margin: 0 auto;
  padding: 26px clamp(20px, 5vw, 64px) 80px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 18px;
}
.folder {
  position: relative; text-align: left; cursor: pointer; font: inherit;
  background: var(--paper); border: 1px solid var(--rule); border-radius: 3px;
  padding: 26px 24px 22px;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.folder:hover { transform: translateY(-2px); box-shadow: var(--shadow-card); border-color: var(--gold-hair); }
.folder .folder-tab {
  position: absolute; top: -9px; left: 20px; height: 9px; width: 64px;
  background: var(--paper); border: 1px solid var(--rule); border-bottom: 0;
  border-radius: 3px 3px 0 0;
}
.folder:hover .folder-tab { border-color: var(--gold-hair); }
.folder .glyph { color: var(--gold); margin-bottom: 14px; }
.folder h2 { font-family: Georgia, 'Times New Roman', serif; font-weight: 400; font-size: 20px; color: var(--ink); margin: 0 0 6px; }
.folder .desc { font-size: 13px; color: var(--ink-mute); margin: 0 0 14px; min-height: 2.6em; }
.folder .count { font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--ink-fade); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.folder .count b { color: var(--gold-deep); font-weight: 600; }
.folder-create {
  font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--gold-deep); text-decoration: none; white-space: nowrap;
  border-bottom: 1px solid transparent; padding-bottom: 1px;
}
.folder-create:hover { border-bottom-color: var(--gold-hair); }

/* ---- playbook cards ------------------------------------------- */
.cards { max-width: 1200px; margin: 0 auto; padding: 26px clamp(20px, 5vw, 64px) 80px; display: flex; flex-direction: column; gap: 14px; }
.pcard {
  display: flex; align-items: center; gap: 24px; cursor: pointer;
  background: var(--paper); border: 1px solid var(--rule); border-radius: 3px;
  padding: 24px 28px; text-decoration: none;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.pcard:hover { transform: translateY(-2px); box-shadow: var(--shadow-card); border-color: var(--gold-hair); }
.pcard .book {
  flex: 0 0 auto; width: 46px; height: 60px;
  border: 1px solid var(--gold-hair); border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  color: var(--gold); background: var(--paper-warm);
}
.pcard .body { flex: 1 1 auto; min-width: 0; }
.pcard h3 { font-family: Georgia, 'Times New Roman', serif; font-weight: 400; font-size: 21px; color: var(--ink); margin: 0 0 4px; }
.pcard .edition { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
.pcard .desc { font-size: 13.5px; color: var(--ink-mute); margin: 0; max-width: 640px; }
.pcard .meta { font-size: 12px; color: var(--ink-fade); margin-top: 10px; }
.pcard .open {
  flex: 0 0 auto; font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--gold-deep); border: 1px solid var(--gold-hair); border-radius: 2px;
  padding: 11px 22px; white-space: nowrap; transition: background .2s, color .2s;
  text-decoration: none;
}
.pcard:hover .open { background: var(--gold); color: #fff; border-color: var(--gold); }
.pcard .edit-link {
  flex: 0 0 auto; font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--ink-mute); border: 1px solid var(--rule); border-radius: 2px;
  padding: 11px 18px; white-space: nowrap; text-decoration: none;
  transition: border-color .2s, color .2s;
}
.pcard .edit-link:hover { border-color: var(--gold-hair); color: var(--gold-deep); }
.pcard .actions { flex: 0 0 auto; display: flex; gap: 8px; align-items: center; }

.create-card {
  border-style: dashed; border-color: var(--gold-hair); background: var(--paper-warm);
}
.create-card:hover { border-color: var(--gold); }
.create-card .book {
  border-style: dashed; color: var(--celadon); font-size: 26px; line-height: 1;
  font-family: Georgia, serif;
}
.create-card h3 { color: var(--gold-deep); }
.create-card .open { border-style: dashed; }

.empty {
  max-width: 1200px; margin: 0 auto; padding: 40px clamp(20px, 5vw, 64px) 80px;
  color: var(--ink-fade); font-size: 14px;
}
.error-box {
  max-width: 560px; margin: 80px auto; text-align: center; padding: 0 24px;
  color: var(--ink-mute); font-size: 14px;
}

/* ---- footer ---------------------------------------------------- */
.footer {
  border-top: 1px solid var(--rule); background: var(--paper);
  padding: 26px clamp(20px, 5vw, 64px);
  display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
  font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-fade);
}

@media (max-width: 640px) {
  .pcard { flex-wrap: wrap; gap: 16px; }
  .pcard .actions { width: 100%; }
  .pcard .actions .open { flex: 1; text-align: center; }
  .pcard .actions .edit-link { flex: 0 0 auto; }
  .wordmark { font-size: 11px; letter-spacing: .26em; }
}
</style>
</head>
<body>

<header class="topbar">
  <a class="wordmark" href="./">Mandarin Oriental<small>Playbook Library</small></a>
  <a class="studio-link" href="authoring-tool/" title="Sign in to edit and publish playbooks">Playbook Studio</a>
</header>

<section class="hero">
  <div class="eyebrow">Colleague Resources</div>
  <h1>The Playbook Library</h1>
  <p>Choose a department folder to browse its playbooks, or search across the library. Playbooks open in your browser — no sign-in needed to read.</p>
  <div class="hairline"></div>
</section>

<div class="toolbar">
  <input class="search" id="search" type="search" placeholder="Search playbooks…" aria-label="Search playbooks" />
</div>

<nav class="crumb" id="crumb" hidden></nav>
<main id="main">
  <div class="grid" id="grid"></div>
</main>

<footer class="footer">
  <span>Mandarin Oriental Hotel Group</span>
  <span id="foot-status">Internal colleague resource</span>
</footer>

<script>
(function () {
  'use strict';

  var STORAGE_BASE = 'https://akcypiuealhfqspiwebp.supabase.co/storage/v1/object/public/playbook-content/published/';

  var state = { departments: [], playbooks: [], dept: null, query: '' };

  var grid = document.getElementById('grid');
  var main = document.getElementById('main');
  var crumb = document.getElementById('crumb');
  var search = document.getElementById('search');

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function deptById(id) {
    for (var i = 0; i < state.departments.length; i++) if (state.departments[i].id === id) return state.departments[i];
    return { id: id, name: id, description: '' };
  }

  function playbooksIn(deptId) {
    return state.playbooks.filter(function (p) { return p.department === deptId; });
  }

  function matching(p, q) {
    if (!q) return true;
    q = q.toLowerCase();
    return (p.title || '').toLowerCase().indexOf(q) >= 0 ||
           (p.description || '').toLowerCase().indexOf(q) >= 0;
  }

  function playbookUrl(p) {
    if (p.url) return p.url;
    return 'player/index.html?slug=' + encodeURIComponent(p.slug);
  }

  var FOLDER_SVG = '<svg class="glyph" width="34" height="26" viewBox="0 0 34 26" fill="none" aria-hidden="true">' +
    '<path d="M1.5 4.5A2.5 2.5 0 0 1 4 2h8l3 4h15a2.5 2.5 0 0 1 2.5 2.5v13A2.5 2.5 0 0 1 30 24H4a2.5 2.5 0 0 1-2.5-2.5v-17Z" stroke="currentColor" stroke-width="1.4"/></svg>';
  var BOOK_SVG = '<svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">' +
    '<path d="M4 2.8h11.5A2.5 2.5 0 0 1 18 5.3v13.9H6.5A2.5 2.5 0 0 1 4 16.7V2.8Z" stroke="currentColor" stroke-width="1.3"/>' +
    '<path d="M4 16.7a2.5 2.5 0 0 1 2.5-2.5H18" stroke="currentColor" stroke-width="1.3"/></svg>';

  /* ---- views -------------------------------------------------- */

  function renderFolders() {
    crumb.hidden = true;
    document.title = 'Mandarin Oriental · Playbook Library';
    var q = state.query;
    var html = '';
    state.departments.forEach(function (d) {
      var books = playbooksIn(d.id).filter(function (p) { return matching(p, q); });
      if (q && books.length === 0) return; // searching hides empty folders
      var createUrl = 'authoring-tool/?create=' + encodeURIComponent(d.id) + '&dept=' + encodeURIComponent(d.name);
      html += '<div class="folder" data-dept="' + esc(d.id) + '" role="button" tabindex="0">' +
        '<span class="folder-tab"></span>' + FOLDER_SVG +
        '<h2>' + esc(d.name) + '</h2>' +
        '<p class="desc">' + esc(d.description || '') + '</p>' +
        '<div class="count"><span><b>' + books.length + '</b> playbook' + (books.length === 1 ? '' : 's') + '</span>' +
        '<a class="folder-create" href="' + esc(createUrl) + '" title="Create a new ' + esc(d.name) + ' playbook in Playbook Studio">+ Create</a></div>' +
        '</div>';
    });
    grid.className = 'grid';
    grid.innerHTML = html || '<div class="empty">No departments match your search.</div>';
    Array.prototype.forEach.call(grid.querySelectorAll('.folder'), function (card) {
      card.addEventListener('click', function (e) {
        if (e.target.closest && e.target.closest('.folder-create')) return; // let the create link navigate
        state.dept = card.getAttribute('data-dept'); renderDepartment();
      });
      card.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && e.target === card) { state.dept = card.getAttribute('data-dept'); renderDepartment(); }
      });
    });
  }

  function renderDepartment() {
    var d = deptById(state.dept);
    document.title = 'Mandarin Oriental · ' + d.name;
    crumb.hidden = false;
    crumb.innerHTML = '<button type="button" id="crumb-home">All Departments</button><span class="sep">/</span><span>' + esc(d.name) + '</span>';
    document.getElementById('crumb-home').addEventListener('click', function () { state.dept = null; renderFolders(); });

    var books = playbooksIn(d.id).filter(function (p) { return matching(p, state.query); });
    var createUrl = 'authoring-tool/?create=' + encodeURIComponent(d.id) + '&dept=' + encodeURIComponent(d.name);
    var html = '<a class="pcard create-card" href="' + esc(createUrl) + '" title="Open Playbook Studio to author a new playbook for this department">' +
      '<span class="book">+</span>' +
      '<span class="body">' +
        '<h3>Create a playbook</h3>' +
        '<p class="desc">Author a new ' + esc(d.name) + ' playbook in Playbook Studio. Sign-in required; it appears here once published and listed in playbooks.json.</p>' +
      '</span>' +
      '<span class="open">Create</span>' +
      '</a>';
    books.forEach(function (p) {
      html += '<div class="pcard" data-url="' + esc(playbookUrl(p)) + '" role="link" tabindex="0">' +
        '<span class="book">' + BOOK_SVG + '</span>' +
        '<span class="body">' +
          '<h3>' + esc(p.title || p.slug) + '</h3>' +
          (p.edition ? '<div class="edition">' + esc(p.edition) + '</div>' : '') +
          '<p class="desc">' + esc(p.description || '') + '</p>' +
          '<div class="meta" data-version-for="' + esc(p.slug) + '"></div>' +
        '</span>' +
        '<span class="actions">' +
          '<a class="edit-link" href="authoring-tool/?edit=' + encodeURIComponent(p.slug) + '" title="Edit this playbook in Playbook Studio (sign-in to save and publish)">Edit</a>' +
          '<a class="open" href="' + esc(playbookUrl(p)) + '">Open Playbook</a>' +
        '</span>' +
        '</div>';
    });
    grid.className = 'cards';
    grid.innerHTML = html;
    Array.prototype.forEach.call(grid.querySelectorAll('.pcard'), function (card) {
      card.addEventListener('click', function (e) {
        if (e.target.closest && e.target.closest('a')) return; // real links handle themselves
        window.location.href = card.getAttribute('data-url');
      });
      card.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && e.target === card) window.location.href = card.getAttribute('data-url');
      });
    });
    if (!books.length) {
      grid.innerHTML = html + '<div class="empty" style="padding-top:8px;padding-bottom:40px;">No playbooks published in ' + esc(d.name) + ' yet.' +
        (state.query ? ' Try clearing your search.' : '') + '</div>';
      return;
    }
    books.forEach(fillVersionMeta);
  }

  // Lazily fetch version.json (public bucket) to show "Updated <date>".
  function fillVersionMeta(p) {
    var slot = grid.querySelector('[data-version-for="' + p.slug + '"]');
    if (!slot || !p.slug) return;
    fetch(STORAGE_BASE + encodeURIComponent(p.slug) + '/version.json', { cache: 'no-store' })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (v) {
        if (!v || !v.publishedAt) return;
        var dt = new Date(v.publishedAt);
        if (isNaN(dt)) return;
        slot.textContent = 'Updated ' + dt.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
      })
      .catch(function () { /* offline or not published yet — leave blank */ });
  }

  function render() {
    if (state.dept) renderDepartment(); else renderFolders();
  }

  search.addEventListener('input', function () {
    state.query = search.value.trim();
    render();
  });

  /* ---- boot ---------------------------------------------------- */
  fetch('playbooks.json', { cache: 'no-store' })
    .then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function (data) {
      state.departments = data.departments || [];
      state.playbooks = data.playbooks || [];
      // Any playbook whose department is not listed gets an implicit folder.
      state.playbooks.forEach(function (p) {
        if (!state.departments.some(function (d) { return d.id === p.department; })) {
          state.departments.push({ id: p.department, name: p.department, description: '' });
        }
      });
      document.getElementById('foot-status').textContent =
        state.playbooks.length + ' playbook' + (state.playbooks.length === 1 ? '' : 's') +
        ' · ' + state.departments.length + ' departments';
      render();
    })
    .catch(function (err) {
      grid.className = '';
      grid.innerHTML = '<div class="error-box">The library index (<b>playbooks.json</b>) could not be loaded (' + esc(err.message) + ').<br>Please try again later.</div>';
    });
})();
</script>
</body>
</html>
