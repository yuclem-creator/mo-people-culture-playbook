<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Mandarin Oriental · People & Culture Playbook</title>
<link rel="stylesheet" href="mo-brand.css">
<style>
/* ============================================================
   MANDARIN ORIENTAL — P&C PLAYBOOK · MAGAZINE EDITION V2
   Aesthetic: "Luxury Living" — white pages, condensed display
   serif, single thin gold hairline, large numeric anchors,
   photography-forward, quiet luxury.
   ============================================================ */

:root {
  /* Palette — cool, gallery-clean */
  --paper: #FFFFFF;
  --paper-warm: #FAF9F6;      /* subtle warm variant for cards */
  --paper-tint: #F5F3EE;      /* the rare inset panel */
  --ink: #0d0b08;
  --ink-body: #262220;
  --ink-mute: #6b625a;
  --ink-fade: #a89f92;
  --rule: #E5E2DA;
  --rule-strong: #C9C4B8;
  --gold: #B59060;
  --gold-deep: #8f6d3f;
  --gold-hair: #C9A879;       /* the signature thin rule */
  --mo-red: #8B1E2C;
  --celadon: #7C917F;         /* MO celadon green — secondary accent */
  --celadon-deep: #5C7062;    /* deeper celadon for text/contrast */
  --celadon-hair: #A9BBAC;    /* soft celadon hairline */
  --celadon-tint: #EDF1EC;    /* pale celadon wash for panels */
  --shadow-hair: 0 1px 0 rgba(13,11,8,0.04);
  --shadow-card: 0 1px 2px rgba(13,11,8,0.03), 0 12px 32px rgba(13,11,8,0.06);
  --rail-w: 260px;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--paper);
  color: var(--ink-body);
  font-family: 'Avenir Next LT Pro', system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* Typography */
h1, h2, h3, h4 { font-family: 'MO Exceptional', Georgia, serif; font-weight: 500; letter-spacing: -0.005em; color: var(--ink); margin: 0; }
h1 { font-size: clamp(3rem, 6vw, 5.5rem); line-height: 0.98; font-weight: 500; letter-spacing: -0.015em; }
h2 { font-size: clamp(2rem, 3.5vw, 3rem); line-height: 1.05; font-weight: 500; }
h3 { font-family: 'MO Exceptional', Georgia, serif; font-size: 1.6rem; line-height: 1.2; font-weight: 500; }
h4 { font-family: 'Avenir Next LT Pro', sans-serif; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-mute); }
p { margin: 0 0 1em; color: var(--ink-body); }
em, .italic { font-style: italic; }
a { color: var(--gold-deep); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
a:hover { border-bottom-color: var(--gold-deep); }
button { font-family: inherit; cursor: pointer; background: none; border: 0; padding: 0; color: inherit; text-align: left; }

.serif { font-family: 'MO Exceptional', Georgia, serif; }
.serif-italic { font-family: 'Avenir Next LT Pro', 'Helvetica Neue', Arial, sans-serif; font-style: italic; }
.small-caps { font-family: 'Avenir Next LT Pro', sans-serif; font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 500; color: var(--ink-mute); }
.number-anchor { font-family: 'MO Exceptional', Georgia, serif; font-size: 0.9rem; font-weight: 500; letter-spacing: 0.12em; color: var(--gold-deep); font-style: italic; }

/* Gold hairline — the ONE ornamental device */
.gold-rule { height: 1px; background: var(--gold-hair); width: 60px; border: none; margin: 24px 0; }
.gold-rule.wide { width: 100%; }
.gold-rule.center { margin-left: auto; margin-right: auto; }

/* Reading progress */
.progress-bar {
  position: fixed; top: 0; left: 0; height: 2px;
  background: var(--gold-hair);
  z-index: 500; width: 0%;
  transition: width 0.15s ease;
}

/* ============================================================
   RUNNING HEADER — the top-of-page identity line
   ============================================================ */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.95);
  backdrop-filter: saturate(180%) blur(10px);
  -webkit-backdrop-filter: saturate(180%) blur(10px);
  border-bottom: 1px solid var(--rule);
  padding: 18px 32px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 24px;
}
.brand-left { display: flex; align-items: center; gap: 12px; }
.brand-mark {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--mo-red);
  display: flex; align-items: center; justify-content: center;
  color: #f2e1c2; font-family: 'MO Exceptional', serif; font-style: italic; font-weight: 500;
  font-size: 15px;
}
.brand-mark-text { display: flex; flex-direction: column; line-height: 1; }
.brand-title { font-family: 'MO Exceptional', serif; font-size: 1rem; font-weight: 500; letter-spacing: 0.01em; }
.brand-sub { font-size: 0.62rem; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.18em; margin-top: 3px; }
.brand-fan { display: inline-flex; align-items: center; color: var(--gold-deep); text-decoration: none; }
.brand-fan svg { height: 34px; width: auto; display: block; }
.brand-fan:hover { color: var(--gold); }
.brand-wordmark {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.28em;
  color: var(--ink);
  text-transform: uppercase;
  white-space: nowrap;
  padding-left: 14px;
  margin-left: 4px;
  border-left: 1px solid var(--rule);
}

.running-header {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.32em;
  color: var(--ink);
  text-transform: uppercase;
  text-align: center;
  white-space: nowrap;
}

.brand-right { display: flex; align-items: center; justify-content: flex-end; gap: 12px; }

/* Search — kept prominent, but styled quieter */
.search {
  position: relative; width: 260px; max-width: 100%;
}
.search input {
  width: 100%;
  padding: 10px 14px 10px 34px;
  border: 1px solid var(--rule);
  border-radius: 2px;
  background: var(--paper);
  color: var(--ink);
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.82rem;
  letter-spacing: 0.02em;
  transition: border-color 0.15s;
}
.search input:focus { outline: none; border-color: var(--gold-hair); }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--ink-mute); width: 14px; height: 14px;
}
.search-hint {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  color: var(--ink-fade); font-size: 0.62rem; letter-spacing: 0.06em;
  border: 1px solid var(--rule); padding: 1px 6px; border-radius: 2px;
}
.search-results {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--paper);
  border: 1px solid var(--rule);
  box-shadow: var(--shadow-card);
  max-height: 420px; overflow: auto;
  display: none; z-index: 10;
}
.search-results.on { display: block; }
.search-result {
  padding: 12px 16px;
  border-bottom: 1px solid var(--rule);
  cursor: pointer;
  transition: background 0.12s;
}
.search-result:last-child { border-bottom: none; }
.search-result:hover, .search-result.sel { background: var(--paper-tint); }
.search-result .sr-title { font-family: 'MO Exceptional', serif; font-size: 0.95rem; color: var(--ink); }
.search-result .sr-crumb { font-size: 0.68rem; color: var(--ink-mute); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }

.bookmark-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  border: 1px solid var(--rule);
  background: var(--paper);
  color: var(--ink-mute);
  font-size: 0.7rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  border-radius: 2px;
  transition: color 0.15s, border-color 0.15s;
}
.bookmark-btn:hover { color: var(--ink); border-color: var(--rule-strong); }
.bookmark-count { color: var(--gold-deep); }

/* ============================================================
   LAYOUT — left rail (chapters) + reading pane
   ============================================================ */
.layout {
  display: grid;
  grid-template-columns: var(--rail-w) 1fr;
  min-height: calc(100vh - 66px);
}

/* Left rail: editorial table of contents (no boxes, no borders) */
.rail {
  position: sticky; top: 66px;
  height: calc(100vh - 66px);
  overflow-y: auto;
  padding: 52px 28px 52px 40px;
  border-right: 1px solid var(--rule);
  background: var(--paper);
}
.rail-eyebrow {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--ink-fade);
  margin-bottom: 6px;
  font-weight: 500;
}
.rail-eyebrow-rule {
  width: 32px; height: 1px; background: var(--gold-hair);
  margin-bottom: 34px;
}
.rail-chapters { list-style: none; padding: 0; margin: 0; }
.rail-chapters > li { margin: 0; }

.rail-link {
  display: grid;
  grid-template-columns: 28px 1fr;
  align-items: baseline;
  column-gap: 14px;
  padding: 14px 0 14px 0;
  color: var(--ink-body);
  font-family: 'MO Exceptional', serif;
  font-size: 1.02rem;
  font-weight: 400;
  line-height: 1.28;
  letter-spacing: 0.002em;
  cursor: pointer;
  transition: color 0.18s ease, transform 0.24s ease;
  width: 100%;
  position: relative;
}
.rail-link .rail-numeral {
  font-family: 'MO Exceptional', serif;
  font-style: italic;
  font-size: 0.82rem;
  color: var(--ink-fade);
  letter-spacing: 0.04em;
  text-align: left;
  transition: color 0.18s ease;
}
.rail-link:hover { color: var(--ink); }
.rail-link:hover .rail-numeral { color: var(--gold-deep); }

/* Active chapter: shift right slightly, gold numeral, tiny gold marker to the left of the numeral */
.rail-link.active {
  color: var(--ink);
  transform: translateX(4px);
}
.rail-link.active .rail-numeral {
  color: var(--gold-deep);
  font-style: italic;
}
.rail-link.active::before {
  content: '';
  position: absolute;
  left: -16px;
  top: 50%;
  transform: translateY(-50%);
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gold-deep);
  opacity: 0.9;
}

/* Hairline divider between chapters — subtle, only between items */
.rail-chapters > li + li .rail-link {
  border-top: 1px solid var(--rule-soft, rgba(0,0,0,0.06));
}

/* Sub-items (A–H under Chapter III) */
.rail-sub {
  list-style: none;
  padding: 4px 0 10px 42px;
  margin: 0;
  display: none;
  position: relative;
}
.rail-sub::before {
  content: '';
  position: absolute;
  left: 30px; top: 6px; bottom: 12px;
  width: 1px;
  background: var(--gold-hair);
  opacity: 0.55;
}
.rail-sub.on { display: block; }
.rail-sub li { margin: 0; }
.rail-sub button {
  display: grid;
  grid-template-columns: 22px 1fr;
  align-items: baseline;
  column-gap: 10px;
  padding: 7px 0;
  color: var(--ink-mute);
  font-family: 'MO Exceptional', serif;
  font-size: 0.86rem;
  font-weight: 400;
  letter-spacing: 0.005em;
  width: 100%;
  transition: color 0.15s ease, transform 0.2s ease;
}
.rail-sub button::before {
  content: attr(data-letter);
  font-family: 'MO Exceptional', serif;
  font-style: italic;
  font-size: 0.74rem;
  color: var(--ink-fade);
  transition: color 0.15s ease;
}
.rail-sub button:hover { color: var(--ink); transform: translateX(2px); }
.rail-sub button:hover::before { color: var(--gold-deep); }
.rail-sub button.active { color: var(--ink); }
.rail-sub button.active::before { color: var(--gold-deep); }

.rail-footer {
  margin-top: 56px;
  padding-top: 28px;
  position: relative;
}
.rail-footer::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 28px; height: 1px;
  background: var(--gold-hair);
}
.rail-footer h4 {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--ink-fade);
  font-weight: 500;
  margin-bottom: 10px;
}
.rail-footer p {
  font-family: 'Avenir Next LT Pro', 'Helvetica Neue', Arial, sans-serif;
  font-style: italic;
  font-size: 0.92rem;
  color: var(--ink-mute);
  line-height: 1.55;
}

/* ============================================================
   READING PANE
   ============================================================ */
.reader {
  padding: 0;
  max-width: none;
  min-width: 0;
}

.chapter { display: none; animation: fadeIn 0.35s ease both; }
.chapter.on { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

/* ============================================================
   SPREADS — the fundamental page unit
   ============================================================ */
.spread {
  padding: 72px 80px;
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
}
.spread.tight { padding-top: 48px; padding-bottom: 48px; }
.spread + .spread { border-top: 1px solid var(--rule); }

/* Chapter opener — full-bleed hero image with numeric anchor */
.opener {
  position: relative;
  padding: 0;
  max-width: none;
  overflow: hidden;
}
.opener-hero {
  position: relative;
  height: 82vh;
  min-height: 620px;
  max-height: 900px;
  background-size: cover;
  background-position: center;
  overflow: hidden;
}
.opener-hero::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.32) 0%, rgba(0,0,0,0.12) 22%, rgba(0,0,0,0.05) 45%, rgba(0,0,0,0.55) 100%);
}
.opener-content {
  position: absolute; inset: 0;
  padding: 56px 80px;
  display: flex; flex-direction: column; justify-content: space-between;
  color: #f7f4ee;
  z-index: 2;
}
.opener-top { display: flex; justify-content: space-between; align-items: flex-start; }
.opener-top-left { display: flex; align-items: center; gap: 22px; }
.opener-back {
  display: inline-flex; align-items: center; gap: 9px;
  font-family: 'Avenir Next LT Pro', 'Helvetica Neue', Arial, sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: #f7f4ee;
  background: rgba(20, 16, 12, 0.34);
  border: 1px solid rgba(247, 244, 238, 0.45);
  border-radius: 999px;
  padding: 9px 18px 9px 14px;
  cursor: pointer;
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  transition: background 0.25s ease, border-color 0.25s ease;
}
.opener-back:hover { background: rgba(20, 16, 12, 0.6); border-color: rgba(247, 244, 238, 0.8); }
.opener-back svg { width: 15px; height: 15px; display: block; }
.opener-numeral {
  font-family: 'MO Exceptional', serif;
  font-style: italic;
  font-size: 0.9rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: #ffffff;
  text-shadow: 0 1px 8px rgba(0,0,0,0.45);
}
.opener-eyebrow {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: rgba(247, 244, 238, 0.92);
  text-align: right;
  text-shadow: 0 1px 8px rgba(0,0,0,0.45);
  padding-top: 8px;
}
.opener-bottom {
  max-width: 640px;
}
.opener-title {
  font-family: 'MO Exceptional', serif;
  font-weight: 500;
  font-size: clamp(3rem, 6vw, 5rem);
  line-height: 0.98;
  letter-spacing: -0.015em;
  color: #ffffff;
  margin: 0 0 20px;
}
.opener-sub {
  font-family: 'Avenir Next LT Pro', 'Helvetica Neue', Arial, sans-serif;
  font-style: italic;
  font-size: clamp(1.05rem, 1.4vw, 1.35rem);
  line-height: 1.4;
  color: rgba(247, 244, 238, 0.92);
  max-width: 520px;
}

/* =================================================================
   FULL-SCREEN IMMERSIVE COVER (magazine-style)
   ================================================================= */
.cover-full {
  position: relative;
  width: 100vw;
  min-height: 100vh;
  min-height: 100svh;
  margin-left: calc(50% - 50vw);
  background-size: cover;
  background-position: center 28%;
  display: flex;
  overflow: hidden;
}
.cover-veil {
  position: absolute; inset: 0;
  background:
    linear-gradient(180deg, rgba(13,11,8,0.46) 0%, rgba(13,11,8,0.12) 30%, rgba(13,11,8,0.30) 62%, rgba(13,11,8,0.78) 100%);
  z-index: 1;
}
.cover-inner {
  position: relative;
  z-index: 2;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: clamp(28px, 4.4vw, 60px) clamp(28px, 6vw, 96px);
  color: #f7f4ee;
}
.cover-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.cover-wordmark {
  font-family: 'MO Exceptional', serif;
  font-size: clamp(1rem, 1.5vw, 1.5rem);
  letter-spacing: 0.34em;
  text-transform: uppercase;
  color: #ffffff;
}
.cover-edition {
  font-family: 'MO Exceptional', serif;
  font-style: italic;
  font-size: 0.85rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: rgba(247, 244, 238, 0.85);
}
.cover-center {
  max-width: 760px;
  /* Sit the block in the upper-middle so the CTA rises well clear of the
     bottom edge and reads immediately. */
  margin: auto 0;
  padding-bottom: clamp(60px, 12vh, 150px);
}
.cover-eyebrow {
  font-family: 'MO Exceptional', serif;
  font-style: italic;
  font-size: clamp(0.9rem, 1.2vw, 1.15rem);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(247, 244, 238, 0.9);
  margin-bottom: 22px;
}
.cover-title {
  font-family: 'MO Exceptional', serif;
  font-weight: 500;
  font-size: clamp(3rem, 7vw, 6rem);
  line-height: 0.98;
  letter-spacing: -0.015em;
  color: #ffffff;
  margin: 0 0 24px;
}
.cover-title em {
  font-style: italic;
  font-weight: 400;
}
.cover-sub {
  font-family: 'Avenir Next LT Pro', 'Helvetica Neue', Arial, sans-serif;
  font-style: italic;
  font-size: clamp(1.05rem, 1.5vw, 1.4rem);
  line-height: 1.45;
  color: rgba(247, 244, 238, 0.94);
  max-width: 560px;
  margin: 0 0 28px;
}
.cover-full .cover-cta {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 18px 38px;
  /* Solid gold fill for a clearly visible, primary call-to-action. */
  background: var(--gold);
  border: 1px solid var(--gold);
  color: #1a1408;
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(0,0,0,0.28);
  transition: background 0.35s ease, border-color 0.35s ease, letter-spacing 0.35s ease, transform 0.35s ease, box-shadow 0.35s ease;
}
.cover-full .cover-cta:hover {
  background: #c9a25f;
  border-color: #c9a25f;
  letter-spacing: 0.3em;
  transform: translateY(-2px);
  box-shadow: 0 14px 36px rgba(0,0,0,0.34);
}
.cover-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: rgba(247, 244, 238, 0.7);
}
.cover-scroll { color: rgba(247, 244, 238, 0.85); }

/* =================================================================
   INTRO VIDEO PAGE (welcome interstitial — video only)
   ================================================================= */
.intro-full {
  position: relative;
  width: 100vw;
  min-height: 100vh;
  min-height: 100svh;
  margin-left: calc(50% - 50vw);
  background: var(--paper);
  background: linear-gradient(180deg, var(--paper) 0%, var(--paper-warm) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: clamp(32px, 5vw, 72px) clamp(20px, 5vw, 80px);
}
.intro-inner {
  width: 100%;
  max-width: 900px;
  text-align: center;
  color: var(--ink-body);
}
.intro-eyebrow {
  font-family: 'MO Exceptional', serif;
  font-style: italic;
  font-size: clamp(0.85rem, 1.1vw, 1.05rem);
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin-bottom: 16px;
}
.intro-eyebrow::after {
  content: '';
  display: block;
  width: 46px;
  height: 1px;
  background: var(--gold-hair);
  margin: 16px auto 0;
}
.intro-title {
  font-family: 'MO Exceptional', serif;
  font-weight: 500;
  font-size: clamp(1.7rem, 3.6vw, 3rem);
  line-height: 1.12;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin: 0 auto 34px;
  max-width: 820px;
}
.intro-video-wrap {
  position: relative;
  width: 100%;
  max-width: 820px;
  margin: 0 auto;
  aspect-ratio: 16 / 9;
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 24px 60px rgba(13, 11, 8, 0.18);
  border: 1px solid var(--gold-hair);
  background: #000;
}
.intro-video {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  background: #000;
}
.intro-next {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  margin-top: 32px;
  padding: 15px 32px;
  background: transparent;
  border: 1px solid var(--ink);
  color: var(--ink);
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.4s ease, border-color 0.4s ease, color 0.4s ease, letter-spacing 0.4s ease;
}
.intro-next:hover {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--paper);
  letter-spacing: 0.3em;
}
@media (max-width: 700px) {
  .intro-full { padding: 40px 18px; }
}

/* When on the cover, hide the reading chrome so it fills the screen */
body.on-cover .topbar { display: none; }
body.on-cover .rail { display: none; }
body.on-cover .layout { grid-template-columns: 1fr; min-height: 100vh; margin: 0; }
body.on-cover .reader { margin: 0; padding: 0; max-width: none; }
body.on-cover .menu-fab { display: none; }

@media (max-width: 700px) {
  .cover-inner { padding: 26px 22px 30px; }
  .cover-wordmark { letter-spacing: 0.24em; }
  .cover-foot { font-size: 0.52rem; letter-spacing: 0.28em; }
}

/* Content spread that follows an opener */
.spread-header {
  margin-bottom: 40px;
}
.spread-header .running-mini {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.62rem;
  font-weight: 500;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--ink-mute);
  text-align: center;
  margin-bottom: 8px;
}
.spread-header .center-rule {
  width: 40px; height: 1px; background: var(--gold-hair);
  margin: 0 auto 40px;
}
.spread-title {
  font-family: 'MO Exceptional', serif;
  font-weight: 500;
  font-size: clamp(2.2rem, 3.2vw, 3rem);
  line-height: 1.05;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin-bottom: 12px;
}
.spread-title.center { text-align: center; }
.spread-lede {
  font-family: 'Avenir Next LT Pro', 'Helvetica Neue', Arial, sans-serif;
  font-style: italic;
  font-size: 1.25rem;
  color: var(--ink-mute);
  max-width: 640px;
  line-height: 1.5;
}
.spread-lede.center { margin-left: auto; margin-right: auto; text-align: center; }

/* Two-column body */
.cols-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
}
.cols-2 p { font-size: 0.95rem; line-height: 1.75; color: var(--ink-body); }

/* Editorial body (single column, generous measure) */
.editorial-body {
  max-width: 680px;
  margin: 0 auto;
}
.editorial-body p {
  font-size: 1rem;
  line-height: 1.8;
  color: var(--ink-body);
  margin-bottom: 1.4em;
}
.editorial-body p:first-of-type::first-letter,
.editorial-body .drop::first-letter {
  font-family: 'MO Exceptional', serif;
  font-weight: 500;
  font-size: 4.2em;
  float: left;
  line-height: 0.85;
  margin: 0.05em 0.12em -0.05em 0;
  color: var(--ink);
}

/* Pull quote */
.pullquote {
  font-family: 'MO Exceptional', serif;
  font-style: italic;
  font-weight: 500;
  font-size: clamp(1.5rem, 2.2vw, 2rem);
  line-height: 1.3;
  color: var(--ink);
  text-align: center;
  padding: 40px 24px;
  margin: 48px auto;
  max-width: 720px;
  border-top: 1px solid var(--gold-hair);
  border-bottom: 1px solid var(--gold-hair);
  position: relative;
}
.pullquote::before, .pullquote::after {
  content: '';
  position: absolute;
  left: 50%; transform: translateX(-50%);
  width: 6px; height: 6px;
  background: var(--gold-hair);
  border-radius: 50%;
}
.pullquote::before { top: -3.5px; }
.pullquote::after { bottom: -3.5px; }

/* ============================================================
   EDITORIAL FEATURE TREATMENT (Welcome / Introduction)
   Magazine-style visual card row + elevated pull-quote +
   circular line-icon step sequence.
   ============================================================ */
.feature-caption {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--gold-deep);
  text-align: center;
  margin: 52px 0 6px;
}
.feature-caption::after {
  content: '';
  display: block;
  width: 52px; height: 1px;
  background: var(--gold-hair);
  margin: 16px auto 0;
}

/* Visual card row (image + line icon + label) */
.feature-cards {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 22px;
  margin: 28px 0 8px;
}
.feature-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  border-bottom: none;
  cursor: pointer;
  transition: transform 0.35s cubic-bezier(0.2,0.7,0.2,1);
}
.feature-card:hover { transform: translateY(-4px); border-bottom: none; }
.feature-card-img {
  width: 100%;
  aspect-ratio: 3 / 4;
  background-size: cover;
  background-position: center;
  filter: saturate(0.92) contrast(1.02);
  position: relative;
}
.feature-card-img::after {
  content: '';
  position: absolute; inset: 0;
  border: 1px solid rgba(201,168,121,0.0);
  box-shadow: inset 0 0 0 1px rgba(13,11,8,0.04);
  transition: border-color 0.35s;
}
.feature-card:hover .feature-card-img::after { border-color: var(--gold-hair); }
.feature-card-icon {
  width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--gold-hair);
  border-radius: 50%;
  background: var(--paper);
  margin: -21px auto 0;
  position: relative; z-index: 2;
  color: var(--gold-deep);
  transition: background 0.35s, color 0.35s;
}
.feature-card-icon .line-icon { width: 20px; height: 20px; }
.feature-card:hover .feature-card-icon { background: var(--gold-deep); color: #fff; }
.feature-card-label {
  font-family: 'MO Exceptional', serif;
  font-size: 1.02rem;
  color: var(--ink);
  margin-top: 12px;
  letter-spacing: 0.01em;
}

/* Elevated pull-quote with oversized quotation mark */
.pullquote--feature {
  border: none;
  padding: 8px 24px 12px;
  margin: 44px auto 24px;
  max-width: 780px;
}
.pullquote--feature::before, .pullquote--feature::after { display: none; }
.pullquote--feature .pullquote-mark {
  display: block;
  font-family: 'MO Exceptional', Georgia, serif;
  font-style: normal;
  font-size: 5.5rem;
  line-height: 0.7;
  color: var(--gold-hair);
  height: 46px;
  margin-bottom: 6px;
}
.pullquote--feature .pullquote-text {
  font-family: 'MO Exceptional', serif;
  font-style: italic;
  font-size: clamp(1.5rem, 2.2vw, 2rem);
  line-height: 1.32;
  color: var(--ink);
  margin: 0;
}
.pullquote--feature .pullquote-flourish {
  display: block;
  width: 54px; height: 1px;
  background: var(--gold-hair);
  margin: 26px auto 0;
  position: relative;
}
.pullquote--feature .pullquote-flourish::before {
  content: '';
  position: absolute;
  left: 50%; top: 50%;
  width: 5px; height: 5px;
  background: var(--gold-hair);
  border-radius: 50%;
  transform: translate(-50%, -50%) rotate(45deg);
}

/* Circular line-icon step sequence */
.step-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 40px;
  margin: 30px 0 20px;
  position: relative;
}
.step-row::before {
  content: '';
  position: absolute;
  top: 34px; left: 16.6%; right: 16.6%;
  height: 1px;
  background: repeating-linear-gradient(to right, var(--gold-hair) 0 6px, transparent 6px 12px);
  z-index: 0;
}
.step-node {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  position: relative;
  z-index: 1;
}
.step-icon {
  width: 68px; height: 68px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--gold-hair);
  border-radius: 50%;
  background: var(--paper);
  color: var(--gold-deep);
  position: relative;
}
.step-icon .line-icon { width: 30px; height: 30px; }
.step-index {
  position: absolute;
  bottom: -4px; right: -4px;
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  background: var(--gold-deep);
  color: #fff;
  border-radius: 50%;
  font-family: 'MO Exceptional', Georgia, serif;
  font-style: italic;
  font-size: 0.66rem;
  letter-spacing: 0.02em;
}
.step-title {
  font-family: 'MO Exceptional', serif;
  font-size: 1.05rem;
  color: var(--ink);
  margin: 16px 0 8px;
}
.step-text {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.9rem;
  line-height: 1.65;
  color: var(--ink-body);
  max-width: 260px;
  margin: 0;
}

@media (max-width: 860px) {
  .feature-cards { grid-template-columns: repeat(2, 1fr); gap: 18px; }
  .step-row { grid-template-columns: 1fr; gap: 28px; }
  .step-row::before { display: none; }
  .step-text { max-width: 380px; }
}
@media (max-width: 480px) {
  .feature-cards { grid-template-columns: 1fr 1fr; }
}

/* ============================================================
   MAGAZINE EDITORIAL SPREAD (Our Purpose)
   Tall image left; body + featured pull-quote right.
   ============================================================ */
.editorial-spread {
  display: grid;
  grid-template-columns: 0.92fr 1.08fr;
  gap: 56px;
  align-items: stretch;
  margin-top: 8px;
}
.editorial-figure { margin: 0; display: flex; flex-direction: column; }
.editorial-figure-img {
  width: 100%;
  flex: 1 1 auto;
  min-height: 460px;
  background-size: cover;
  background-position: center 22%;
  filter: saturate(0.94) contrast(1.02);
}
.editorial-figure-cap {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--gold-hair);
}
.editorial-col { display: flex; flex-direction: column; justify-content: flex-start; }
.editorial-col .editorial-body p:first-of-type::first-letter,
.editorial-col .editorial-body .drop::first-letter { color: var(--gold-deep); }
.editorial-quote {
  margin: 28px 0 0;
  padding: 26px 0 0;
  border-top: 1px solid var(--gold-hair);
  position: relative;
}
.editorial-quote-mark {
  display: block;
  font-family: 'MO Exceptional', Georgia, serif;
  font-size: 3.4rem;
  line-height: 0.5;
  color: var(--gold-hair);
  height: 30px;
  margin-bottom: 10px;
}
.editorial-quote-text {
  font-family: 'MO Exceptional', serif;
  font-style: italic;
  font-weight: 500;
  font-size: clamp(1.35rem, 1.7vw, 1.7rem);
  line-height: 1.34;
  color: var(--ink);
  margin: 0;
}

/* ============================================================
   THE COLLEAGUE JOURNEY (illustrative map, not navigation)
   ============================================================ */
.journey { margin-top: 68px; }
.journey-head { text-align: center; max-width: 720px; margin: 0 auto; }
.journey-intro {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 1rem;
  line-height: 1.7;
  color: var(--ink-body);
  margin-top: 16px;
}
.journey-path {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 16px;
  margin: 44px 0 0;
  position: relative;
}
/* Flowing connector line linking the stages */
.journey-path::before {
  content: '';
  position: absolute;
  top: 122px; left: 10%; right: 10%;
  height: 2px;
  background: repeating-linear-gradient(to right, var(--gold-hair) 0 7px, transparent 7px 15px);
  z-index: 0;
}
.journey-stage {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}
.journey-media {
  position: relative;
  width: min(176px, 100%); aspect-ratio: 1 / 1;
  margin-bottom: 22px;
}
.journey-img {
  width: 100%; height: 100%;
  border-radius: 50%;
  background-size: cover;
  background-position: center;
  filter: saturate(0.92) contrast(1.02);
  box-shadow: 0 0 0 1px var(--rule), 0 0 0 7px var(--paper), 0 0 0 8px var(--gold-hair);
}
.journey-node {
  position: absolute;
  bottom: -6px; left: 50%;
  transform: translateX(-50%);
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  background: var(--paper);
  border: 1px solid var(--gold-hair);
  border-radius: 50%;
  color: var(--gold-deep);
}
.journey-node .line-icon { width: 20px; height: 20px; }
.journey-step {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.58rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--ink-fade);
  margin-bottom: 4px;
}
.journey-stage-name {
  font-family: 'MO Exceptional', serif;
  font-size: 1.16rem;
  color: var(--ink);
  margin-bottom: 10px;
}
.journey-stage-name::after {
  content: '';
  display: block;
  width: 24px; height: 1px;
  background: var(--gold-hair);
  margin: 8px auto 0;
}
.journey-role {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.82rem;
  line-height: 1.6;
  color: var(--ink-body);
  margin: 0;
}
.journey-foot {
  font-family: 'MO Exceptional', serif;
  font-style: italic;
  font-size: 1.1rem;
  color: var(--ink);
  text-align: center;
  max-width: 640px;
  margin: 48px auto 0;
  padding-top: 26px;
  border-top: 1px solid var(--gold-hair);
}

/* Reverse spread (text left, image right) & short figure variant */
.editorial-spread--reverse { grid-template-columns: 1.08fr 0.92fr; }
.editorial-figure--short .editorial-figure-img { min-height: 300px; }

/* ============================================================
   CH4 — PRE-OPENING PHILOSOPHY (magazine spread)
   ============================================================ */
.philosophy-spread { margin: 8px 0 8px; }
.philosophy-spread-eyebrow {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--gold-hair);
}
.philosophy-spread .editorial-body p {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 1rem;
  line-height: 1.85;
  color: var(--ink-body);
  margin: 0 0 16px;
}
.philosophy-spread .editorial-body .drop::first-letter {
  font-family: 'MO Exceptional', Georgia, serif;
  float: left;
  font-size: 3.6rem;
  line-height: 0.82;
  padding: 6px 12px 0 0;
  color: var(--gold-deep);
}
/* Short one-line philosophy opener (used instead of a lone drop-cap) */
.philosophy-spread .editorial-body .philosophy-lead-line {
  font-family: 'MO Exceptional', Georgia, serif;
  font-style: italic;
  font-size: 1.28rem;
  line-height: 1.45;
  color: var(--gold-deep);
  margin: 0 0 20px;
}
/* Icon-led emphasis box that chunks dense verbatim prose (Design Language #2) */
.prose-emphasis {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  margin: 22px 0;
  padding: 18px 20px;
  background: var(--celadon-tint);
  border-left: 3px solid var(--celadon-deep);
}
.prose-emphasis-icon {
  flex: 0 0 auto;
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  color: var(--celadon-deep);
  margin-top: 2px;
}
.prose-emphasis-icon .line-icon { width: 22px; height: 22px; }
.prose-emphasis-text {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.98rem;
  line-height: 1.7;
  color: var(--ink-body);
  margin: 0;
}
/* In-body pull-quote inside a philosophy spread (verbatim emphasised sentence) */
.philosophy-spread .editorial-quote {
  margin: 22px 0;
  padding: 4px 0 4px 22px;
  border-left: 2px solid var(--gold-hair);
  position: relative;
}
.philosophy-spread .editorial-quote-mark {
  position: absolute; left: 14px; top: -10px;
  font-family: 'MO Exceptional', Georgia, serif;
  font-size: 2.4rem; color: var(--gold-hair); line-height: 1;
}
.philosophy-spread .editorial-quote-text {
  font-family: 'MO Exceptional', Georgia, serif;
  font-style: italic;
  font-size: 1.32rem;
  line-height: 1.5;
  color: var(--ink);
  margin: 0;
}
/* Give the prose column a touch more room than the card column */
.philosophy-spread .editorial-spread { grid-template-columns: 1.12fr 0.88fr; align-items: start; }
.philosophy-card-col { display: flex; }
/* Framed iconography card (mirrors image-13's bordered right panel) */
.philosophy-card {
  width: 100%;
  border: 1px solid var(--rule-strong);
  border-top: 3px solid var(--gold);
  background: var(--paper-warm);
  padding: 30px 30px 34px;
  display: flex;
  flex-direction: column;
}
.philosophy-card-eyebrow {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--gold-deep);
  text-align: center;
  padding-bottom: 16px;
  margin-bottom: 22px;
  border-bottom: 1px solid var(--gold-hair);
}
.philosophy-card-crest {
  width: 54px; height: 54px;
  margin: 0 auto 18px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--gold-hair);
  border-radius: 50%;
  color: var(--gold-deep);
}
.philosophy-card-crest svg { width: 26px; height: 26px; }
.philosophy-card-lead {
  font-family: 'MO Exceptional', Georgia, serif;
  font-style: italic;
  font-size: 1.06rem;
  line-height: 1.45;
  color: var(--ink);
  text-align: center;
  margin: 0 0 22px;
}
.philosophy-card-rows { display: flex; flex-direction: column; }
.pcard-row {
  display: flex;
  align-items: flex-start;
  gap: 15px;
  padding: 15px 0;
  border-top: 1px solid var(--rule);
}
.pcard-row:first-child { border-top: none; }
.pcard-row-icon {
  flex: 0 0 auto;
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  color: var(--celadon-deep);
}
.pcard-row-icon svg { width: 21px; height: 21px; }
.pcard-row-text {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.9rem;
  line-height: 1.5;
  color: var(--ink-body);
}
/* The "role is to ensure" lead + bullets, full width below the spread */
.philosophy-ensure {
  margin-top: 44px;
  padding-top: 32px;
  border-top: 1px solid var(--gold-hair);
  max-width: 900px;
}
.philosophy-ensure-lead {
  font-family: 'MO Exceptional', Georgia, serif;
  font-style: italic;
  font-size: 1.2rem;
  color: var(--ink);
  margin: 0 0 18px;
}
.philosophy-ensure-list {
  list-style: none;
  margin: 0; padding: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px 40px;
}
.philosophy-ensure-list li {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.95rem;
  line-height: 1.65;
  color: var(--ink-body);
  padding-left: 24px;
  position: relative;
}
.philosophy-ensure-list li::before {
  content: '';
  position: absolute;
  left: 0; top: 0.62em;
  width: 7px; height: 7px;
  border: 1px solid var(--gold-deep);
  transform: rotate(45deg);
}

/* ============================================================
   CH4 — MILESTONE VERTICAL TIMELINE (Pre-Opening Path)
   ============================================================ */
.mstone { margin: 44px 0 8px; }
.mstone-grid {
  display: grid;
  grid-template-columns: 0.82fr 1.18fr;
  gap: 56px;
  align-items: start;
}
.mstone-left { position: sticky; top: 96px; }
.mstone-eyebrow {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin-bottom: 12px;
}
.mstone-heading {
  font-family: 'MO Exceptional', Georgia, serif;
  font-size: 1.8rem;
  font-weight: 500;
  color: var(--ink);
  margin: 0 0 18px;
  line-height: 1.15;
}
.mstone-lead p {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.95rem;
  line-height: 1.8;
  color: var(--ink-body);
  margin: 0 0 14px;
}
/* image-7-style callout band */
.mstone-callout {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-top: 22px;
  padding: 22px 24px;
  background: var(--paper-tint);
  border-left: 2px solid var(--gold);
}
.mstone-callout-icon {
  flex: 0 0 auto;
  color: var(--gold-deep);
}
.mstone-callout-icon .line-icon { width: 26px; height: 26px; }
.mstone-callout-text {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.92rem;
  line-height: 1.7;
  color: var(--ink-body);
  margin: 0;
}
.mstone-callout-text em {
  font-style: italic;
  font-weight: 600;
  color: var(--gold-deep);
  letter-spacing: 0.01em;
}
/* vertical timeline */
.mstone-timeline {
  list-style: none;
  margin: 0; padding: 0;
  position: relative;
}
.mstone-timeline::before {
  content: '';
  position: absolute;
  left: 21px; top: 8px; bottom: 8px;
  width: 1px;
  background: var(--gold-hair);
}
.mstone-step {
  position: relative;
  display: grid;
  grid-template-columns: 44px 1fr;
  gap: 22px;
  padding-bottom: 34px;
}
.mstone-step:last-child { padding-bottom: 0; }
.mstone-marker {
  position: relative;
  z-index: 1;
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  background: var(--paper);
  border: 1px solid var(--gold-hair);
  border-radius: 50%;
  color: var(--gold-deep);
}
.mstone-marker .line-icon { width: 22px; height: 22px; }
.mstone-body { padding-top: 4px; }
.mstone-step-eyebrow {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 1.12rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink);
  margin-bottom: 10px;
  line-height: 1.2;
}
.mstone-step-text {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.92rem;
  line-height: 1.72;
  color: var(--ink-body);
  margin: 0;
}

/* ============================================================
   CH5 — P&C AUDIT INTRO + FRAMEWORK ORBIT DIAGRAM
   ============================================================ */
.audit-intro-lede p {
  font-family: 'MO Exceptional', Georgia, serif;
  font-style: italic;
  font-size: 1.5rem;
  line-height: 1.5;
  color: var(--ink);
  max-width: 780px;
  margin: 0 0 8px;
}
.audit-intro-body p {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 1rem;
  line-height: 1.85;
  color: var(--ink-body);
  max-width: 780px;
  margin: 0 0 16px;
}

/* Framework orbit diagram — sits in the RIGHT column of the audit spread,
   mirroring the image column of the standard magazine spread. */
.audit-visual-col { justify-content: stretch; }
.orbit {
  height: 100%;
  display: flex;
  flex-direction: column;
  margin: 0;
  padding: 34px 36px;
  background: linear-gradient(160deg, var(--paper-warm) 0%, var(--celadon-tint) 220%);
  border: 1px solid var(--gold-hair);
  border-top: 3px solid var(--celadon);
}
.orbit-eyebrow {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--gold-deep);
  text-align: center;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--gold-hair);
}
.orbit-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.orbit-stage svg { max-width: 320px; width: 100%; height: auto; }
.orbit-stage svg.audit-orbit-svg { max-width: 420px; }
.orbit-caption {
  font-family: 'MO Exceptional', Georgia, serif;
  font-style: italic;
  font-size: 0.92rem;
  color: var(--ink-mute);
  text-align: center;
  max-width: 300px;
  margin-top: 14px;
  line-height: 1.5;
}
.orbit-benefits {
  margin-top: 26px;
  padding-top: 22px;
  border-top: 1px solid var(--gold-hair);
}
.orbit-benefits-eyebrow {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-mute);
  text-align: center;
  margin-bottom: 10px;
}
.orbit-benefit {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 0;
  border-top: 1px solid var(--gold-hair);
}
.orbit-benefits-eyebrow + .orbit-benefit { border-top: none; }
.orbit-benefit:last-child { border-bottom: 1px solid var(--gold-hair); }
.orbit-benefit-icon {
  flex: 0 0 auto;
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--celadon-hair);
  border-radius: 50%;
  color: var(--celadon-deep);
  background: var(--paper);
}
.orbit-benefit-icon .line-icon { width: 22px; height: 22px; }
.orbit-benefit-body { padding-top: 2px; }
.orbit-benefit-label {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--celadon-deep);
  margin-bottom: 6px;
}
.orbit-benefit-text {
  font-family: 'MO Exceptional', Georgia, serif;
  font-style: italic;
  font-size: 1.02rem;
  line-height: 1.34;
  color: var(--ink);
  margin: 0;
  text-transform: capitalize;
}

/* Strategic Vision globe — celadon sphere, gold pins + gold goal callouts,
   the mirror-image accent mix of the audit orbit (gold core / celadon ring). */
.globe { border-top: 3px solid var(--gold); }
.globe .orbit-eyebrow { color: var(--celadon-deep); border-bottom-color: var(--celadon-hair); }

/* Strategic Vision globe (static) — large sphere, criss-crossing gold lines
   and hotel-icon destinations. No animation. */
.globe .orbit-stage svg.globe-svg { max-width: 420px; }
.globe .orbit-caption { max-width: 380px; }
.globe-goal {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 0;
  border-top: 1px solid var(--gold-hair);
}
.orbit-benefits-eyebrow + .globe-goal { border-top: none; }
.globe-goal:last-child { border-bottom: 1px solid var(--gold-hair); }
.globe-goal-icon {
  flex: 0 0 auto;
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--gold-hair);
  border-radius: 50%;
  color: var(--gold-deep);
  background: var(--paper);
}
.globe-goal-icon .line-icon { width: 22px; height: 22px; }
.globe-goal-body { padding-top: 2px; }
.globe-goal-label {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin-bottom: 6px;
}
.globe-goal-text {
  font-family: 'MO Exceptional', Georgia, serif;
  font-style: italic;
  font-size: 1.02rem;
  line-height: 1.34;
  color: var(--ink);
  margin: 0;
}

/* ---- Vision / Mission / Values — interactive click-to-reveal ---- */
.beliefs-intro {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.9rem;
  color: var(--ink-mute);
  margin: 0 0 22px;
}
.beliefs-tabs {
  display: flex;
  gap: 40px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 40px;
}
.beliefs-tab {
  appearance: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0 0 16px;
  margin-bottom: -1px;
  font-family: 'MO Exceptional', Georgia, serif;
  font-style: italic;
  font-size: 1.5rem;
  font-weight: 500;
  color: var(--ink-fade);
  border-bottom: 2px solid transparent;
  transition: color 0.25s, border-color 0.25s;
}
.beliefs-tab:hover { color: var(--gold-deep); }
.beliefs-tab.is-active {
  color: var(--ink);
  border-bottom-color: var(--gold);
}
.beliefs-panel {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 56px;
  align-items: start;
  animation: beliefsFade 0.45s ease;
}
.beliefs-panel[hidden] { display: none; }
@keyframes beliefsFade {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.beliefs-statement-col {
  background: linear-gradient(160deg, var(--celadon-tint) 0%, var(--paper-warm) 130%);
  border-left: 3px solid var(--celadon);
  padding: 40px 38px;
}
.beliefs-statement-eyebrow {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--celadon-deep);
  margin-bottom: 22px;
}
.beliefs-statement {
  font-family: 'MO Exceptional', Georgia, serif;
  font-size: 2.05rem;
  line-height: 1.2;
  font-weight: 500;
  color: var(--ink);
}
.beliefs-statement em {
  font-style: italic;
  color: var(--gold-deep);
}
.beliefs-items-col { padding-top: 4px; }
.beliefs-item {
  display: flex;
  align-items: flex-start;
  gap: 18px;
  padding: 18px 0;
  border-top: 1px solid var(--rule);
}
.beliefs-item:first-child { border-top: none; padding-top: 0; }
.beliefs-item-icon {
  flex: 0 0 auto;
  width: 46px; height: 46px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--celadon-hair);
  border-radius: 50%;
  color: var(--celadon-deep);
  background: var(--paper);
}
.beliefs-item-icon .line-icon { width: 22px; height: 22px; }
.beliefs-item-body { padding-top: 3px; }
.beliefs-item-label {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.66rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin-bottom: 6px;
}
.beliefs-item-text {
  font-family: 'MO Exceptional', Georgia, serif;
  font-style: italic;
  font-size: 1.08rem;
  line-height: 1.35;
  color: var(--ink);
  margin: 0;
}
.beliefs-values-note { margin-top: 44px; }

/* Section lead-in (italic intro under an eyebrow) */
.section-lead {
  max-width: 680px;
  margin: 4px auto 0;
  text-align: center;
  color: var(--ink-body);
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-style: italic;
  font-size: 1.12rem;
  line-height: 1.6;
}

/* ============================================================
   BUBBLE LIST — circular image + serif number + heading + caption
   (key points expressed as elegant bubbles)
   ============================================================ */
.bubble-list {
  display: flex;
  flex-direction: column;
  gap: 28px;
  margin: 30px 0 4px;
}
.bubble-item {
  display: flex;
  align-items: center;
  gap: 22px;
}
.bubble-media {
  position: relative;
  flex: 0 0 auto;
  width: 96px; height: 96px;
}
.bubble-img {
  width: 96px; height: 96px;
  border-radius: 50%;
  background-size: cover;
  background-position: center;
  filter: saturate(0.92) contrast(1.02);
  box-shadow: 0 0 0 1px var(--rule), 0 0 0 5px var(--paper), 0 0 0 6px var(--gold-hair);
}
.bubble-num {
  position: absolute;
  top: -6px; right: -6px;
  font-family: 'MO Exceptional', Georgia, serif;
  font-size: 1.7rem;
  line-height: 1;
  color: var(--gold-deep);
  background: var(--paper);
  padding: 2px 6px;
}
.bubble-body { flex: 1 1 auto; }
.bubble-title {
  font-family: 'MO Exceptional', serif;
  font-size: 1.24rem;
  color: var(--ink);
  margin: 0 0 6px;
  letter-spacing: 0.01em;
}
.bubble-text {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.92rem;
  line-height: 1.6;
  color: var(--ink-body);
  margin: 0;
}

/* Refined symbol legend — carded, centered grid */
.symbol-legend--refined {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 22px;
  margin-top: 30px;
}
.symbol-legend--refined .symbol-item {
  background: var(--paper-warm);
  border: 1px solid var(--rule);
  border-top: 2px solid var(--gold-hair);
  padding: 26px 26px 24px;
  display: flex;
  gap: 18px;
  align-items: flex-start;
}
.symbol-legend--refined .sym {
  flex: 0 0 auto;
  width: 52px; height: 52px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--gold-hair);
  border-radius: 50%;
  color: var(--gold-deep);
  background: var(--paper);
}
.symbol-legend--refined .sym .line-icon { width: 24px; height: 24px; }
.symbol-legend--refined h4 {
  font-family: 'MO Exceptional', serif;
  font-size: 1.12rem;
  color: var(--ink);
  margin: 2px 0 6px;
}
.symbol-legend--refined p {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.88rem;
  line-height: 1.6;
  color: var(--ink-body);
  margin: 0;
}

@media (max-width: 900px) {
  .editorial-spread { grid-template-columns: 1fr; gap: 32px; }
  .philosophy-spread .editorial-spread { grid-template-columns: 1fr; gap: 32px; }
  .editorial-spread--reverse { grid-template-columns: 1fr; }
  .editorial-spread--reverse .editorial-figure { order: -1; }
  .editorial-figure-img { min-height: 340px; }
  .editorial-figure--short .editorial-figure-img { min-height: 260px; }
  .journey-path { grid-template-columns: repeat(2, 1fr); gap: 40px 26px; }
  .journey-path::before { display: none; }
  .symbol-legend--refined { grid-template-columns: 1fr; }
}
@media (max-width: 520px) {
  .journey-path { grid-template-columns: 1fr; }
  .journey-media { width: 172px; height: auto; }
  .bubble-item { gap: 16px; }
  .bubble-media, .bubble-img { width: 80px; height: 80px; }
}

/* ============================================================
   CPO LETTER SPREAD (Chapter I)
   ============================================================ */
.cpo-spread {
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 56px;
  align-items: start;
}
.cpo-portrait-wrap { position: relative; }
.cpo-portrait {
  width: 100%;
  aspect-ratio: 3/4;
  object-fit: cover;
  display: block;
  background: var(--paper-tint);
}
.cpo-caption {
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid var(--gold-hair);
}
.cpo-caption .cpo-name { font-family: 'MO Exceptional', serif; font-size: 1.1rem; color: var(--ink); font-weight: 500; }
.cpo-caption .cpo-role { font-family: 'Avenir Next LT Pro', sans-serif; font-style: italic; font-size: 0.95rem; color: var(--ink-mute); margin-top: 2px; }
.cpo-letter { padding-top: 8px; }
.cpo-letter .letter-greeting { font-family: 'Avenir Next LT Pro', sans-serif; font-style: italic; font-size: 1.4rem; color: var(--ink); margin-bottom: 20px; }
.cpo-letter .letter-body p { font-size: 1rem; line-height: 1.8; color: var(--ink-body); margin-bottom: 1.1em; }
.cpo-letter .letter-body strong { color: var(--ink); font-weight: 600; }
.cpo-letter .letter-close { margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--rule); }
.cpo-letter .letter-signature { font-family: 'Avenir Next LT Pro', sans-serif; font-style: italic; font-size: 1.15rem; color: var(--ink); }

/* ============================================================
   PHOTO GRID (About MO, Global Presence, etc.)
   ============================================================ */
.photo-grid {
  display: grid;
  gap: 4px;
}
.photo-grid.two { grid-template-columns: 1fr 1fr; }
.photo-grid.three { grid-template-columns: repeat(3, 1fr); }
.photo-grid img { width: 100%; aspect-ratio: 4/5; object-fit: cover; display: block; background: var(--paper-tint); }
.photo-grid.landscape img { aspect-ratio: 4/3; }

/* Mosaic — one large + tiled small */
.mosaic {
  display: grid;
  grid-template-columns: 1.6fr 1fr;
  gap: 6px;
}
.mosaic-main { aspect-ratio: 4/5; overflow: hidden; }
.mosaic-main img { width: 100%; height: 100%; object-fit: cover; display: block; }
.mosaic-side { display: grid; grid-template-rows: 1fr 1fr; gap: 6px; }
.mosaic-side img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* Full-bleed image inside a spread */
.bleed-img {
  width: 100%;
  aspect-ratio: 16/7;
  object-fit: cover;
  display: block;
  background: var(--paper-tint);
  margin: 0;
}

/* ============================================================
   LEADERS GRID (Senior Management, VP)
   ============================================================ */
.section-eyebrow {
  display: flex; align-items: center; gap: 16px;
  margin: 56px 0 32px;
}
.section-eyebrow .num {
  font-family: 'MO Exceptional', serif;
  font-style: italic;
  font-size: 1.6rem;
  color: var(--gold-deep);
  min-width: 40px;
}
.section-eyebrow .txt {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--ink);
  font-weight: 500;
}
.section-eyebrow .rule { flex: 1; height: 1px; background: var(--gold-hair); }
.section-eyebrow .eyebrow-icon {
  flex: 0 0 auto;
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--gold-hair);
  border-radius: 50%;
  color: var(--gold-deep);
}
.section-eyebrow .eyebrow-icon .line-icon { width: 17px; height: 17px; }

.leaders-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px 16px;
  margin-top: 32px;
}
.leader { text-align: left; }
.leader-photo {
  width: 100%;
  aspect-ratio: 3/4;
  object-fit: cover;
  background: var(--paper-tint);
  display: block;
  margin-bottom: 10px;
  filter: grayscale(0.15) contrast(1.02);
}
.leader-name { font-family: 'MO Exceptional', serif; font-size: 0.95rem; font-weight: 500; color: var(--ink); line-height: 1.2; margin-bottom: 4px; }
.leader-role { font-family: 'Avenir Next LT Pro', sans-serif; font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-mute); line-height: 1.4; }
.leaders-grid--pc { grid-template-columns: repeat(4, 1fr); max-width: 860px; margin-left: auto; margin-right: auto; gap: 8px 24px; }

.leader-footnote {
  margin-top: 24px;
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-style: italic;
  font-size: 0.95rem;
  color: var(--ink-mute);
  text-align: center;
}

/* Heritage figure (reception colleagues) */
.heritage-figure { margin: 0 0 28px; }
.heritage-figure-img {
  width: 100%;
  aspect-ratio: 16 / 11;
  background-size: cover;
  background-position: center 42%;
  background-repeat: no-repeat;
  background-color: var(--paper-tint);
}
.heritage-figure-cap {
  margin-top: 10px;
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-mute);
}

/* Editorial image band — chapter visual rhythm (Chapters III–VI) */
.editorial-band { margin: 52px 0 56px; }
.editorial-band-img {
  width: 100%;
  aspect-ratio: 21 / 9;
  background-size: cover;
  background-position: center 45%;
  background-repeat: no-repeat;
  background-color: var(--paper-tint);
  filter: saturate(0.94) contrast(1.02);
  position: relative;
}
.editorial-band-img::after {
  content: '';
  position: absolute; inset: 0;
  box-shadow: inset 0 0 0 1px rgba(13,11,8,0.05);
}
.editorial-band-cap {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-top: 12px;
}
.editorial-band-eyebrow {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-deep);
  white-space: nowrap;
  flex: 0 0 auto;
}
.editorial-band-eyebrow::after {
  content: '';
  display: inline-block;
  width: 26px; height: 1px;
  background: var(--gold-hair);
  vertical-align: middle;
  margin-left: 14px;
}
.editorial-band-text {
  font-family: 'MO Exceptional', Georgia, serif;
  font-style: italic;
  font-size: 0.98rem;
  color: var(--ink-mute);
  line-height: 1.5;
}

/* Full-width (edge-to-edge) atmospheric band. Image spans the chapter width;
   the caption row is re-inset to align with the reading column. */
.editorial-band--full { margin: 0 0 8px; }
.editorial-band--full .editorial-band-img { aspect-ratio: 21 / 8; }
.editorial-band--full .editorial-band-cap {
  max-width: 1200px;
  margin: 12px auto 0;
  padding: 0 80px;
}

/* Board Leadership */
.board-block { margin-top: 48px; }
.board-heading {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 36px;
}
.board-heading .board-rule {
  flex: 1;
  max-width: 140px;
  height: 1px;
  background: var(--gold-hair);
}
.board-title {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--gold-deep);
  white-space: nowrap;
}
.board-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 40px;
  max-width: 720px;
  margin: 0 auto;
}
.board-card { text-align: center; }
.board-role {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 14px;
}
.board-photo {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  object-position: center 22%;
  display: block;
  border: 1px solid var(--rule);
  filter: grayscale(0.12) contrast(1.02);
  margin-bottom: 14px;
}
.board-name {
  font-family: 'MO Exceptional', serif;
  font-size: 1.05rem;
  font-weight: 500;
  color: var(--ink);
}
@media (max-width: 560px) {
  .board-grid { grid-template-columns: 1fr; gap: 32px; max-width: 300px; }
  .board-heading .board-rule { max-width: 60px; }
}

/* VP hierarchy */
.vp-hierarchy {
  margin-top: 24px;
  padding: 40px 32px 32px;
  background: var(--paper-warm);
  position: relative;
}
.vp-hierarchy::before {
  content: '';
  position: absolute; top: 0; left: 40px; right: 40px;
  height: 1px; background: var(--gold-hair);
}
.vp-top { display: flex; justify-content: center; margin-bottom: 56px; position: relative; }
.vp-top::after {
  content: '';
  position: absolute;
  top: calc(100% + 8px);
  left: 50%; transform: translateX(-50%);
  width: 1px; height: 40px;
  background: var(--gold-hair);
}
.vp-branches {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 32px;
  position: relative;
}
.vp-branches::before {
  content: '';
  position: absolute;
  top: -8px; left: 16.66%;
  width: 66.66%; height: 1px;
  background: var(--gold-hair);
}
.vp-branch { position: relative; padding-top: 40px; }
.vp-branch::before {
  content: '';
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 1px; height: 40px;
  background: var(--gold-hair);
}
.vp-card {
  text-align: center;
  padding: 16px 12px 20px;
  background: var(--paper);
  border: 1px solid var(--rule);
}
.vp-card--top {
  border: 1px solid var(--gold-hair);
  padding: 20px 20px 24px;
  max-width: 260px;
}
.vp-role-eyebrow { font-family: 'Avenir Next LT Pro', sans-serif; font-size: 0.6rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold-deep); margin-bottom: 12px; }
.vp-photo {
  width: 96px; height: 96px;
  border-radius: 50%;
  object-fit: cover;
  margin: 0 auto 12px;
  display: block;
  filter: grayscale(0.15);
}
.vp-card--top .vp-photo { width: 120px; height: 120px; }
.vp-name { font-family: 'MO Exceptional', serif; font-size: 1rem; color: var(--ink); font-weight: 500; }

/* ============================================================
   THE COLLEAGUE LIFECYCLE WHEEL — the main anchor
   ============================================================ */
.wheel-spread {
  padding: 72px 32px 96px;
  text-align: center;
  max-width: 1200px;
  margin: 0 auto;
}
.wheel-layout {
  display: grid;
  grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr);
  align-items: center;
  gap: 48px;
  max-width: 1040px;
  margin: 40px auto 0;
  text-align: left;
}
.wheel-wrap {
  position: relative;
  width: 100%;
  max-width: 560px;
  margin: 0 auto;
  aspect-ratio: 1/1;
}
.wheel-svg { width: 100%; height: 100%; display: block; overflow: visible; }
.wheel-slice { cursor: pointer; transition: opacity 0.18s, transform 0.18s, filter 0.18s; transform-origin: center; transform-box: fill-box; }
.wheel-slice:hover { opacity: 0.92; transform: scale(1.03); }
.wheel-slice.is-active { opacity: 1; transform: scale(1.045); filter: drop-shadow(0 6px 12px rgba(143,109,63,0.35)); }
/* Kill the default rectangular browser outline on click / tap focus (was showing a stray black box above the top slice). Keep an elegant gold ring for keyboard users only. */
.wheel-slice:focus { outline: none; }
.wheel-slice:focus-visible { outline: none; stroke: var(--gold-deep); stroke-width: 3; opacity: 1; }

/* Wheel caption panel — reveals each stage's focus on hover / focus / tap */
.wheel-caption {
  position: relative;
  min-height: 240px;
  display: flex;
  align-items: center;
}
.wheel-caption-inner {
  border-left: 2px solid var(--gold-hair);
  padding: 6px 0 6px 28px;
  animation: wheelCapFade 0.35s ease both;
}
@keyframes wheelCapFade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.wheel-caption--rest { border-left-color: var(--rule); }
.wheel-caption-icon { color: var(--gold-deep); margin-bottom: 16px; }
.wheel-caption-icon .line-icon { width: 34px; height: 34px; }
.wheel-caption-eyebrow {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin-bottom: 12px;
}
.wheel-caption-title {
  font-family: 'MO Exceptional', serif;
  font-size: 1.7rem;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.15;
  margin: 0 0 14px;
}
.wheel-caption-desc {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.92rem;
  color: var(--ink-body);
  line-height: 1.6;
  margin: 0;
  max-width: 34ch;
}
.wheel-caption-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 20px;
  padding: 0;
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold-deep);
  transition: gap 0.2s, color 0.2s;
}
.wheel-caption-cta:hover { gap: 14px; color: var(--ink); }
.wheel-caption-cta svg { width: 18px; height: 18px; }
.wheel-label {
  font-family: 'MO Exceptional', serif;
  font-size: 13px;
  fill: var(--ink);
  pointer-events: none;
  font-weight: 500;
}
.wheel-letter {
  font-family: 'MO Exceptional', serif;
  font-style: italic;
  font-size: 11px;
  fill: var(--ink-mute);
  pointer-events: none;
}
.wheel-center-text {
  fill: var(--ink);
  font-family: 'Avenir Next LT Pro', sans-serif;
}
.wheel-legend {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px 32px;
  max-width: 820px;
  margin: 40px auto 0;
  text-align: left;
}
.wheel-legend-item {
  padding: 20px 0;
  border-top: 1px solid var(--rule);
  cursor: pointer;
  transition: color 0.15s;
}
.wheel-legend-item:hover { color: var(--gold-deep); }
.line-icon { width: 26px; height: 26px; display: block; }
.wheel-legend-item .icon { color: var(--gold-deep); margin-bottom: 12px; opacity: 0.9; transition: opacity 0.15s; }
.wheel-legend-item:hover .icon { opacity: 1; }
.eyebrow-icon { display: inline-block; vertical-align: middle; margin-right: 10px; color: var(--gold-hair); }
.eyebrow-icon .line-icon { width: 20px; height: 20px; display: inline-block; vertical-align: middle; }
.opener-icon { display: inline-block; vertical-align: middle; margin-right: 12px; color: rgba(247,244,238,0.9); }
.opener-icon .line-icon { width: 22px; height: 22px; display: inline-block; vertical-align: middle; }
.wheel-legend-item .num { font-family: 'MO Exceptional', serif; font-style: italic; font-size: 0.85rem; color: var(--gold-deep); letter-spacing: 0.14em; margin-bottom: 4px; }
.wheel-legend-item .title { font-family: 'MO Exceptional', serif; font-size: 1.05rem; color: var(--ink); font-weight: 500; }
.wheel-legend-item .desc {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.75rem;
  color: var(--ink-mute);
  line-height: 1.5;
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  margin-top: 0;
  transition: max-height 0.35s ease, opacity 0.3s ease, margin-top 0.35s ease;
}
@media (hover: hover) {
  .wheel-legend-item:hover .desc { max-height: 120px; opacity: 1; margin-top: 6px; }
}
.wheel-legend-item.open .desc { max-height: 120px; opacity: 1; margin-top: 6px; }
.wheel-legend-item.open .title { color: var(--gold-deep); }

/* ============================================================
   SUB-CHAPTER LAYOUT (within Chapter III)
   ============================================================ */
.sub-hero {
  position: relative;
  height: 480px;
  overflow: hidden;
  margin-bottom: 64px;
}
.sub-hero-img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.sub-hero-caption {

}
.sub-hero-caption .letter {

  color: rgba(255,255,255,0.9);
}
.sub-hero-caption .title-block { flex: 1; }
.sub-hero-caption .eyebrow { font-family: 'Avenir Next LT Pro', sans-serif; font-size: 0.65rem; letter-spacing: 0.32em; text-transform: uppercase; color: rgba(255,255,255,0.85); margin-bottom: 10px; }
.sub-hero-caption h2 { color: #fff; font-family: 'MO Exceptional', serif; font-size: 3rem; font-weight: 500; line-height: 1; letter-spacing: -0.015em; margin-bottom: 12px; }
.sub-hero-caption .sub-lede { font-family: 'Avenir Next LT Pro', sans-serif; font-style: italic; font-size: 1.15rem; color: rgba(255,255,255,0.92); max-width: 560px; }

.philosophy-block {
  max-width: 720px; margin: 0 auto 64px; text-align: center;
}
.philosophy-block .eyebrow { font-family: 'Avenir Next LT Pro', sans-serif; font-size: 0.65rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 20px; }
.philosophy-block .rule { width: 30px; height: 1px; background: var(--gold-hair); margin: 0 auto 24px; }
.philosophy-block p { font-family: 'Avenir Next LT Pro', sans-serif; font-style: italic; font-size: 1.35rem; color: var(--ink); line-height: 1.5; }

/* Policy sections within a sub-chapter */
.policy-section { margin-bottom: 56px; }
.policy-section-header {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--gold-hair);
}
.policy-section-icon {
  flex: 0 0 auto;
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--gold-hair);
  border-radius: 50%;
  color: var(--gold-deep);
  background: var(--paper);
  transition: background 0.35s cubic-bezier(0.2,0.7,0.2,1), color 0.35s;
}
.policy-section-icon .line-icon { width: 20px; height: 20px; }
.policy-section:hover .policy-section-icon { background: var(--gold-deep); color: var(--paper); }
.policy-section-header .num {
  font-family: 'MO Exceptional', serif;
  font-style: italic;

.policy-section-header h3 {
  font-family: 'MO Exceptional', serif;

}

/* Policy chips — the actual resource list */
.policy-list { display: grid; gap: 2px; }
/* Group heading row that titles a set of resources (not itself a resource) */
.policy-group-heading {
  padding: 6px 4px 20px;
  margin-bottom: 6px;
  border-bottom: 1px solid var(--gold-hair);
}
.policy-group-heading + .policy-item { border-top: none; }
.policy-group-heading-top { display: flex; align-items: center; gap: 14px; }
.policy-group-icon {

  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  color: var(--gold-deep);
}
.policy-group-icon .line-icon { width: 20px; height: 20px; }
.policy-group-title {
  font-family: 'MO Exceptional', Georgia, serif;
  font-size: 1.32rem;
  font-weight: 400;
  letter-spacing: 0.01em;
  color: var(--ink);
  margin: 0;
}
.policy-group-desc {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.95rem;
  line-height: 1.7;
  color: var(--ink-body);
  margin: 12px 0 0;
  max-width: 62ch;
}
.policy-item {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  gap: 20px;
  align-items: center;
  padding: 14px 4px;
  border-bottom: 1px solid var(--rule);
  transition: background 0.12s;
}
.policy-item:hover { background: var(--paper-warm); }
.policy-symbol {

}

}
.policy-name-sub {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.06em;
  color: var(--ink-mute);
  margin-top: 3px;
}
.policy-kind {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--ink-mute);
  white-space: nowrap;
}

/* ============================================================
   SUB-CHAPTER INTRO, PHILOSOPHY (multi-para), SECTION BLURBS
   ============================================================ */
/* Sub-chapter opening tagline (verbatim from source) */
.sub-tagline {
  font-family: 'MO Exceptional', Georgia, serif;
  font-style: italic;
  font-size: 1.5rem;
  line-height: 1.45;
  color: var(--ink);
  text-align: center;
  max-width: 760px;
  margin: 0 auto 40px;
}
/* Sub-chapter intro body paragraphs */
.sub-intro {
  max-width: 720px;
  margin: 0 auto 56px;
}
.sub-intro p {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 1rem;
  line-height: 1.8;
  color: var(--ink-body);
  margin: 0 0 1.1em;
}
.sub-intro-lead {
  font-weight: 600;
  color: var(--ink) !important;
  margin-bottom: 0.6em !important;
}
.sub-intro-list {
  list-style: none;
  padding: 0;
  margin: 0 0 1.4em;
}
.sub-intro-list li {
  position: relative;
  padding: 8px 0 8px 26px;
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.95rem;
  line-height: 1.65;
  color: var(--ink-body);
  border-bottom: 1px solid var(--rule);
}
.sub-intro-list li::before {
  content: '';
  position: absolute;
  left: 4px;
  top: 17px;
  width: 7px;
  height: 7px;
  border: 1px solid var(--gold-deep);
  transform: rotate(45deg);
}

/* Philosophy block now supports multiple paragraphs + bullets */
.philosophy-block { text-align: center; }
.philosophy-block p:first-of-type {
  font-size: 1.35rem;
}
.philosophy-block .sub-intro-lead,
.philosophy-block .sub-intro-list {
  text-align: left;
  max-width: 620px;
  margin-left: auto;
  margin-right: auto;
}
.philosophy-block .sub-intro-lead {
  font-style: normal !important;
  font-size: 0.72rem !important;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-mute) !important;
  margin-top: 32px !important;
}
.philosophy-block .sub-intro-list li {
  font-style: normal;
  font-size: 0.95rem;
  color: var(--ink-body);
}

/* Section (numbered heading) intro blurb + transition */
.policy-section-blurb {
  max-width: 720px;
  margin: -8px 0 28px;
}
.policy-section-blurb p {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.98rem;
  line-height: 1.75;
  color: var(--ink-body);
  margin: 0 0 0.9em;
}
.policy-section-transition {
  font-family: 'MO Exceptional', Georgia, serif;
  font-style: italic;
  font-size: 1.05rem;
  line-height: 1.6;
  color: var(--ink-mute);
  max-width: 700px;
  margin: 28px auto 0;
  padding-top: 22px;
  border-top: 1px solid var(--gold-hair);
  text-align: center;
}

/* Editorial pull-quote for the verbatim section “transition” sentence */
.section-quote {
  max-width: 760px;
  margin: 40px auto 8px;
  padding: 4px 24px 0;
  text-align: center;
}
.section-quote-mark {
  display: block;
  font-family: 'MO Exceptional', Georgia, serif;
  font-style: normal;
  font-size: 5rem;
  line-height: 0.6;
  color: var(--gold-hair);
  height: 42px;
}
.section-quote-text {
  font-family: 'MO Exceptional', Georgia, serif;
  font-style: italic;
  font-weight: 500;
  font-size: clamp(1.35rem, 1.9vw, 1.7rem);
  line-height: 1.4;
  color: var(--ink);
  margin: 0;
  quotes: none;
}
.section-quote-text::before, .section-quote-text::after { content: none; }
.section-quote-flourish {
  display: block;
  width: 54px; height: 1px;
  background: var(--gold-hair);
  margin: 24px auto 0;
  position: relative;
}
.section-quote-flourish::before {
  content: '';
  position: absolute;
  left: 50%; top: 50%;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--gold-hair);
  transform: translate(-50%, -50%);
}

/* In-body feature pull-quote (verbatim key sentence, framed within a section) */
.section-quote--feature {
  margin: 34px auto 30px;
  max-width: 720px;
}
.section-quote--feature .section-quote-text {
  font-size: clamp(1.25rem, 1.7vw, 1.55rem);
}

/* Supporting body text that follows the shortened pull-quote (NOT quoted) */
.policy-section-blurb--after {
  max-width: 720px;
  margin: 24px auto 0;
}
.policy-section-blurb--before {
  max-width: 720px;
  margin: 28px 0 4px;
}

/* ============================================================
   HIGHLIGHT ICON-CARD GRID (verbatim key phrases, magazine style)
   ============================================================ */
.hl-block {
  margin: 30px 0 34px;
}
.hl-block-eyebrow {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-deep);

  margin-bottom: 22px;
}

  display: block;
  width: 40px; height: 1px;

}

  display: grid;
  gap: 0;
  border: 1px solid var(--gold-hair);
}
.hl-grid--4 { grid-template-columns: repeat(4, 1fr); }
.hl-grid--3 { grid-template-columns: repeat(3, 1fr); }

  margin-bottom: 16px;
  color: var(--gold-deep);
}
.hl-card-icon .line-icon { width: 30px; height: 30px; }
.hl-card-label {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink);
  margin-bottom: 12px;
}
.hl-card-text {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.86rem;
  line-height: 1.6;
  color: var(--ink-mute);

/* ============================================================
   EXPANDABLE SUBHEADING (ACCORDION) RESOURCE ROWS
   ============================================================ */
.policy-item.accordion { display: block; padding: 0; border-bottom: 1px solid var(--rule); }
.policy-item.accordion:hover { background: transparent; }
.policy-item-toggle {

  grid-template-columns: 32px 1fr auto 20px;

  align-items: center;
  width: 100%;
  padding: 15px 4px;
  background: none;
  border: none;

  text-align: left;
  transition: background 0.12s;
  border-radius: 2px;
}
.policy-item-toggle:hover { background: var(--paper-warm); }
.policy-item-toggle:focus-visible { outline: 2px solid var(--gold-hair); outline-offset: 2px; }
.policy-item-toggle .policy-symbol { color: var(--gold-deep); opacity: 0.85; }
.policy-item-toggle .policy-symbol .line-icon { width: 18px; height: 18px; }
.policy-item-toggle .policy-name {
  font-family: 'MO Exceptional', serif;
  font-size: 0.98rem;
  color: var(--ink);
  font-weight: 500;

}
.policy-item-toggle .policy-kind {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;

  white-space: nowrap;
}
.policy-chevron { color: var(--gold-deep); display: flex; align-items: center; justify-content: center; }
.policy-chevron .line-icon { width: 16px; height: 16px; transition: transform 0.25s ease; }
.policy-item.accordion[data-open="true"] .policy-chevron .line-icon { transform: rotate(180deg); }
.policy-item.accordion[data-open="true"] > .policy-item-toggle { background: var(--paper-warm); }

.policy-item-panel {
  overflow: hidden;
  animation: accGrow 0.28s ease;
}
@keyframes accGrow { from { opacity: 0; } to { opacity: 1; } }
.policy-item-panel-inner {
  padding: 4px 4px 22px 52px;
  border-left: 2px solid var(--gold-hair);
  margin-left: 15px;
}
.policy-item-blurb {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.95rem;
  line-height: 1.7;
  color: var(--ink-body);
  margin: 0 0 16px;
}
.policy-item-resource { display: flex; flex-direction: column; gap: 8px; }
.resource-eyebrow {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.58rem;
  letter-spacing: 0.26em;
  text-transform: uppercase;

}
.resource-link {
  display: inline-flex;

  font-family: 'Avenir Next LT Pro', sans-serif;

}

  background: var(--gold-deep);
  border-color: var(--gold-deep);
  color: #fff;
}
.resource-link-icon { display: flex; align-items: center; flex-shrink: 0; }
