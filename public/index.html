<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Mandarin Oriental · People & Culture Playbook</title>
<link rel="stylesheet" href="mo-brand.css">
<style>
/* ============================================================
   MANDARIN ORIENTAL — P&C PLAYBOOK · MAGAZINE EDITION V2
   Aesthetic: "Luxury Living" — white pages, condensed display
   serif, single thin gold hairline, large numeric anchors,
   photography-forward, quiet luxury.
   ============================================================ */

:root {
  /* Palette — cool, gallery-clean */
  --paper: #FFFFFF;
  --paper-warm: #FAF9F6;      /* subtle warm variant for cards */
  --paper-tint: #F5F3EE;      /* the rare inset panel */
  --ink: #0d0b08;
  --ink-body: #262220;
  --ink-mute: #6b625a;
  --ink-fade: #a89f92;
  --rule: #E5E2DA;
  --rule-strong: #C9C4B8;
  --gold: #B59060;
  --gold-deep: #8f6d3f;
  --gold-hair: #C9A879;       /* the signature thin rule */
  --mo-red: #8B1E2C;
  --shadow-hair: 0 1px 0 rgba(13,11,8,0.04);
  --shadow-card: 0 1px 2px rgba(13,11,8,0.03), 0 12px 32px rgba(13,11,8,0.06);
  --rail-w: 260px;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--paper);
  color: var(--ink-body);
  font-family: 'Avenir Next LT Pro', system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* Typography */
h1, h2, h3, h4 { font-family: 'MO Exceptional', Georgia, serif; font-weight: 500; letter-spacing: -0.005em; color: var(--ink); margin: 0; }
h1 { font-size: clamp(3rem, 6vw, 5.5rem); line-height: 0.98; font-weight: 500; letter-spacing: -0.015em; }
h2 { font-size: clamp(2rem, 3.5vw, 3rem); line-height: 1.05; font-weight: 500; }
h3 { font-family: 'MO Exceptional', Georgia, serif; font-size: 1.6rem; line-height: 1.2; font-weight: 500; }
h4 { font-family: 'Avenir Next LT Pro', sans-serif; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-mute); }
p { margin: 0 0 1em; color: var(--ink-body); }
em, .italic { font-style: italic; }
a { color: var(--gold-deep); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
a:hover { border-bottom-color: var(--gold-deep); }
button { font-family: inherit; cursor: pointer; background: none; border: 0; padding: 0; color: inherit; text-align: left; }

.serif { font-family: 'MO Exceptional', Georgia, serif; }
.serif-italic { font-family: 'Avenir Next LT Pro', 'Helvetica Neue', Arial, sans-serif; font-style: italic; }
.small-caps { font-family: 'Avenir Next LT Pro', sans-serif; font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 500; color: var(--ink-mute); }
.number-anchor { font-family: 'MO Exceptional', Georgia, serif; font-size: 0.9rem; font-weight: 500; letter-spacing: 0.12em; color: var(--gold-deep); font-style: italic; }

/* Gold hairline — the ONE ornamental device */
.gold-rule { height: 1px; background: var(--gold-hair); width: 60px; border: none; margin: 24px 0; }
.gold-rule.wide { width: 100%; }
.gold-rule.center { margin-left: auto; margin-right: auto; }

/* Reading progress */
.progress-bar {
  position: fixed; top: 0; left: 0; height: 2px;
  background: var(--gold-hair);
  z-index: 500; width: 0%;
  transition: width 0.15s ease;
}

/* ============================================================
   RUNNING HEADER — the top-of-page identity line
   ============================================================ */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.95);
  backdrop-filter: saturate(180%) blur(10px);
  -webkit-backdrop-filter: saturate(180%) blur(10px);
  border-bottom: 1px solid var(--rule);
  padding: 18px 32px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 24px;
}
.brand-left { display: flex; align-items: center; gap: 12px; }
.brand-mark {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--mo-red);
  display: flex; align-items: center; justify-content: center;
  color: #f2e1c2; font-family: 'MO Exceptional', serif; font-style: italic; font-weight: 500;
  font-size: 15px;
}
.brand-mark-text { display: flex; flex-direction: column; line-height: 1; }
.brand-title { font-family: 'MO Exceptional', serif; font-size: 1rem; font-weight: 500; letter-spacing: 0.01em; }
.brand-sub { font-size: 0.62rem; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.18em; margin-top: 3px; }

.running-header {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.32em;
  color: var(--ink);
  text-transform: uppercase;
  text-align: center;
  white-space: nowrap;
}

.brand-right { display: flex; align-items: center; justify-content: flex-end; gap: 12px; }

/* Search — kept prominent, but styled quieter */
.search {
  position: relative; width: 260px; max-width: 100%;
}
.search input {
  width: 100%;
  padding: 10px 14px 10px 34px;
  border: 1px solid var(--rule);
  border-radius: 2px;
  background: var(--paper);
  color: var(--ink);
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.82rem;
  letter-spacing: 0.02em;
  transition: border-color 0.15s;
}
.search input:focus { outline: none; border-color: var(--gold-hair); }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--ink-mute); width: 14px; height: 14px;
}
.search-hint {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  color: var(--ink-fade); font-size: 0.62rem; letter-spacing: 0.06em;
  border: 1px solid var(--rule); padding: 1px 6px; border-radius: 2px;
}
.search-results {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--paper);
  border: 1px solid var(--rule);
  box-shadow: var(--shadow-card);
  max-height: 420px; overflow: auto;
  display: none; z-index: 10;
}
.search-results.on { display: block; }
.search-result {
  padding: 12px 16px;
  border-bottom: 1px solid var(--rule);
  cursor: pointer;
  transition: background 0.12s;
}
.search-result:last-child { border-bottom: none; }
.search-result:hover, .search-result.sel { background: var(--paper-tint); }
.search-result .sr-title { font-family: 'MO Exceptional', serif; font-size: 0.95rem; color: var(--ink); }
.search-result .sr-crumb { font-size: 0.68rem; color: var(--ink-mute); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }

.bookmark-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  border: 1px solid var(--rule);
  background: var(--paper);
  color: var(--ink-mute);
  font-size: 0.7rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  border-radius: 2px;
  transition: color 0.15s, border-color 0.15s;
}
.bookmark-btn:hover { color: var(--ink); border-color: var(--rule-strong); }
.bookmark-count { color: var(--gold-deep); }

/* ============================================================
   LAYOUT — left rail (chapters) + reading pane
   ============================================================ */
.layout {
  display: grid;
  grid-template-columns: var(--rail-w) 1fr;
  min-height: calc(100vh - 66px);
}

/* Left rail: editorial table of contents (no boxes, no borders) */
.rail {
  position: sticky; top: 66px;
  height: calc(100vh - 66px);
  overflow-y: auto;
  padding: 52px 28px 52px 40px;
  border-right: 1px solid var(--rule);
  background: var(--paper);
}
.rail-eyebrow {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--ink-fade);
  margin-bottom: 6px;
  font-weight: 500;
}
.rail-eyebrow-rule {
  width: 32px; height: 1px; background: var(--gold-hair);
  margin-bottom: 34px;
}
.rail-chapters { list-style: none; padding: 0; margin: 0; }
.rail-chapters > li { margin: 0; }

.rail-link {
  display: grid;
  grid-template-columns: 28px 1fr;
  align-items: baseline;
  column-gap: 14px;
  padding: 14px 0 14px 0;
  color: var(--ink-body);
  font-family: 'MO Exceptional', serif;
  font-size: 1.02rem;
  font-weight: 400;
  line-height: 1.28;
  letter-spacing: 0.002em;
  cursor: pointer;
  transition: color 0.18s ease, transform 0.24s ease;
  width: 100%;
  position: relative;
}
.rail-link .rail-numeral {
  font-family: 'MO Exceptional', serif;
  font-style: italic;
  font-size: 0.82rem;
  color: var(--ink-fade);
  letter-spacing: 0.04em;
  text-align: left;
  transition: color 0.18s ease;
}
.rail-link:hover { color: var(--ink); }
.rail-link:hover .rail-numeral { color: var(--gold-deep); }

/* Active chapter: shift right slightly, gold numeral, tiny gold marker to the left of the numeral */
.rail-link.active {
  color: var(--ink);
  transform: translateX(4px);
}
.rail-link.active .rail-numeral {
  color: var(--gold-deep);
  font-style: italic;
}
.rail-link.active::before {
  content: '';
  position: absolute;
  left: -16px;
  top: 50%;
  transform: translateY(-50%);
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gold-deep);
  opacity: 0.9;
}

/* Hairline divider between chapters — subtle, only between items */
.rail-chapters > li + li .rail-link {
  border-top: 1px solid var(--rule-soft, rgba(0,0,0,0.06));
}

/* Sub-items (A–H under Chapter III) */
.rail-sub {
  list-style: none;
  padding: 4px 0 10px 42px;
  margin: 0;
  display: none;
  position: relative;
}
.rail-sub::before {
  content: '';
  position: absolute;
  left: 30px; top: 6px; bottom: 12px;
  width: 1px;
  background: var(--gold-hair);
  opacity: 0.55;
}
.rail-sub.on { display: block; }
.rail-sub li { margin: 0; }
.rail-sub button {
  display: grid;
  grid-template-columns: 22px 1fr;
  align-items: baseline;
  column-gap: 10px;
  padding: 7px 0;
  color: var(--ink-mute);
  font-family: 'MO Exceptional', serif;
  font-size: 0.86rem;
  font-weight: 400;
  letter-spacing: 0.005em;
  width: 100%;
  transition: color 0.15s ease, transform 0.2s ease;
}
.rail-sub button::before {
  content: attr(data-letter);
  font-family: 'MO Exceptional', serif;
  font-style: italic;
  font-size: 0.74rem;
  color: var(--ink-fade);
  transition: color 0.15s ease;
}
.rail-sub button:hover { color: var(--ink); transform: translateX(2px); }
.rail-sub button:hover::before { color: var(--gold-deep); }
.rail-sub button.active { color: var(--ink); }
.rail-sub button.active::before { color: var(--gold-deep); }

.rail-footer {
  margin-top: 56px;
  padding-top: 28px;
  position: relative;
}
.rail-footer::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 28px; height: 1px;
  background: var(--gold-hair);
}
.rail-footer h4 {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--ink-fade);
  font-weight: 500;
  margin-bottom: 10px;
}
.rail-footer p {
  font-family: 'Avenir Next LT Pro', 'Helvetica Neue', Arial, sans-serif;
  font-style: italic;
  font-size: 0.92rem;
  color: var(--ink-mute);
  line-height: 1.55;
}

/* ============================================================
   READING PANE
   ============================================================ */
.reader {
  padding: 0;
  max-width: none;
  min-width: 0;
}

.chapter { display: none; animation: fadeIn 0.35s ease both; }
.chapter.on { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

/* ============================================================
   SPREADS — the fundamental page unit
   ============================================================ */
.spread {
  padding: 72px 80px;
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
}
.spread.tight { padding-top: 48px; padding-bottom: 48px; }
.spread + .spread { border-top: 1px solid var(--rule); }

/* Chapter opener — full-bleed hero image with numeric anchor */
.opener {
  position: relative;
  padding: 0;
  max-width: none;
  overflow: hidden;
}
.opener-hero {
  position: relative;
  height: 82vh;
  min-height: 620px;
  max-height: 900px;
  background-size: cover;
  background-position: center;
  overflow: hidden;
}
.opener-hero::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.05) 40%, rgba(0,0,0,0.55) 100%);
}
.opener-content {
  position: absolute; inset: 0;
  padding: 56px 80px;
  display: flex; flex-direction: column; justify-content: space-between;
  color: #f7f4ee;
  z-index: 2;
}
.opener-top { display: flex; justify-content: space-between; align-items: flex-start; }
.opener-numeral {
  font-family: 'MO Exceptional', serif;
  font-style: italic;
  font-size: 0.85rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(247, 244, 238, 0.85);
}
.opener-eyebrow {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: rgba(247, 244, 238, 0.75);
  text-align: right;
}
.opener-bottom {
  max-width: 640px;
}
.opener-title {
  font-family: 'MO Exceptional', serif;
  font-weight: 500;
  font-size: clamp(3rem, 6vw, 5rem);
  line-height: 0.98;
  letter-spacing: -0.015em;
  color: #ffffff;
  margin: 0 0 20px;
}
.opener-sub {
  font-family: 'Avenir Next LT Pro', 'Helvetica Neue', Arial, sans-serif;
  font-style: italic;
  font-size: clamp(1.05rem, 1.4vw, 1.35rem);
  line-height: 1.4;
  color: rgba(247, 244, 238, 0.92);
  max-width: 520px;
}

/* Content spread that follows an opener */
.spread-header {
  margin-bottom: 40px;
}
.spread-header .running-mini {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.62rem;
  font-weight: 500;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--ink-mute);
  text-align: center;
  margin-bottom: 8px;
}
.spread-header .center-rule {
  width: 40px; height: 1px; background: var(--gold-hair);
  margin: 0 auto 40px;
}
.spread-title {
  font-family: 'MO Exceptional', serif;
  font-weight: 500;
  font-size: clamp(2.2rem, 3.2vw, 3rem);
  line-height: 1.05;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin-bottom: 12px;
}
.spread-title.center { text-align: center; }
.spread-lede {
  font-family: 'Avenir Next LT Pro', 'Helvetica Neue', Arial, sans-serif;
  font-style: italic;
  font-size: 1.25rem;
  color: var(--ink-mute);
  max-width: 640px;
  line-height: 1.5;
}
.spread-lede.center { margin-left: auto; margin-right: auto; text-align: center; }

/* Two-column body */
.cols-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
}
.cols-2 p { font-size: 0.95rem; line-height: 1.75; color: var(--ink-body); }

/* Editorial body (single column, generous measure) */
.editorial-body {
  max-width: 680px;
  margin: 0 auto;
}
.editorial-body p {
  font-size: 1rem;
  line-height: 1.8;
  color: var(--ink-body);
  margin-bottom: 1.4em;
}
.editorial-body p:first-of-type::first-letter,
.editorial-body .drop::first-letter {
  font-family: 'MO Exceptional', serif;
  font-weight: 500;
  font-size: 4.2em;
  float: left;
  line-height: 0.85;
  margin: 0.05em 0.12em -0.05em 0;
  color: var(--ink);
}

/* Pull quote */
.pullquote {
  font-family: 'MO Exceptional', serif;
  font-style: italic;
  font-weight: 500;
  font-size: clamp(1.5rem, 2.2vw, 2rem);
  line-height: 1.3;
  color: var(--ink);
  text-align: center;
  padding: 40px 24px;
  margin: 48px auto;
  max-width: 720px;
  border-top: 1px solid var(--gold-hair);
  border-bottom: 1px solid var(--gold-hair);
  position: relative;
}
.pullquote::before, .pullquote::after {
  content: '';
  position: absolute;
  left: 50%; transform: translateX(-50%);
  width: 6px; height: 6px;
  background: var(--gold-hair);
  border-radius: 50%;
}
.pullquote::before { top: -3.5px; }
.pullquote::after { bottom: -3.5px; }

/* ============================================================
   CPO LETTER SPREAD (Chapter I)
   ============================================================ */
.cpo-spread {
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 56px;
  align-items: start;
}
.cpo-portrait-wrap { position: relative; }
.cpo-portrait {
  width: 100%;
  aspect-ratio: 3/4;
  object-fit: cover;
  display: block;
  background: var(--paper-tint);
}
.cpo-caption {
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid var(--gold-hair);
}
.cpo-caption .cpo-name { font-family: 'MO Exceptional', serif; font-size: 1.1rem; color: var(--ink); font-weight: 500; }
.cpo-caption .cpo-role { font-family: 'Avenir Next LT Pro', sans-serif; font-style: italic; font-size: 0.95rem; color: var(--ink-mute); margin-top: 2px; }
.cpo-letter { padding-top: 8px; }
.cpo-letter .letter-greeting { font-family: 'Avenir Next LT Pro', sans-serif; font-style: italic; font-size: 1.4rem; color: var(--ink); margin-bottom: 20px; }
.cpo-letter .letter-body p { font-size: 1rem; line-height: 1.8; color: var(--ink-body); margin-bottom: 1.1em; }
.cpo-letter .letter-body strong { color: var(--ink); font-weight: 600; }
.cpo-letter .letter-close { margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--rule); }
.cpo-letter .letter-signature { font-family: 'Avenir Next LT Pro', sans-serif; font-style: italic; font-size: 1.15rem; color: var(--ink); }

/* ============================================================
   PHOTO GRID (About MO, Global Presence, etc.)
   ============================================================ */
.photo-grid {
  display: grid;
  gap: 4px;
}
.photo-grid.two { grid-template-columns: 1fr 1fr; }
.photo-grid.three { grid-template-columns: repeat(3, 1fr); }
.photo-grid img { width: 100%; aspect-ratio: 4/5; object-fit: cover; display: block; background: var(--paper-tint); }
.photo-grid.landscape img { aspect-ratio: 4/3; }

/* Mosaic — one large + tiled small */
.mosaic {
  display: grid;
  grid-template-columns: 1.6fr 1fr;
  gap: 6px;
}
.mosaic-main { aspect-ratio: 4/5; overflow: hidden; }
.mosaic-main img { width: 100%; height: 100%; object-fit: cover; display: block; }
.mosaic-side { display: grid; grid-template-rows: 1fr 1fr; gap: 6px; }
.mosaic-side img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* Full-bleed image inside a spread */
.bleed-img {
  width: 100%;
  aspect-ratio: 16/7;
  object-fit: cover;
  display: block;
  background: var(--paper-tint);
  margin: 0;
}

/* ============================================================
   LEADERS GRID (Senior Management, VP)
   ============================================================ */
.section-eyebrow {
  display: flex; align-items: center; gap: 16px;
  margin: 56px 0 32px;
}
.section-eyebrow .num {
  font-family: 'MO Exceptional', serif;
  font-style: italic;
  font-size: 1.6rem;
  color: var(--gold-deep);
  min-width: 40px;
}
.section-eyebrow .txt {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--ink);
  font-weight: 500;
}
.section-eyebrow .rule { flex: 1; height: 1px; background: var(--gold-hair); }

.leaders-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px 16px;
  margin-top: 32px;
}
.leader { text-align: left; }
.leader-photo {
  width: 100%;
  aspect-ratio: 3/4;
  object-fit: cover;
  background: var(--paper-tint);
  display: block;
  margin-bottom: 10px;
  filter: grayscale(0.15) contrast(1.02);
}
.leader-name { font-family: 'MO Exceptional', serif; font-size: 0.95rem; font-weight: 500; color: var(--ink); line-height: 1.2; margin-bottom: 4px; }
.leader-role { font-family: 'Avenir Next LT Pro', sans-serif; font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-mute); line-height: 1.4; }

.leader-footnote {
  margin-top: 24px;
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-style: italic;
  font-size: 0.95rem;
  color: var(--ink-mute);
  text-align: center;
}

/* VP hierarchy */
.vp-hierarchy {
  margin-top: 24px;
  padding: 40px 32px 32px;
  background: var(--paper-warm);
  position: relative;
}
.vp-hierarchy::before {
  content: '';
  position: absolute; top: 0; left: 40px; right: 40px;
  height: 1px; background: var(--gold-hair);
}
.vp-top { display: flex; justify-content: center; margin-bottom: 56px; position: relative; }
.vp-top::after {
  content: '';
  position: absolute;
  top: calc(100% + 8px);
  left: 50%; transform: translateX(-50%);
  width: 1px; height: 40px;
  background: var(--gold-hair);
}
.vp-branches {
  display: grid;
  grid-template-columns: repeat(3, 1fr);

.vp-branches::before {

.vp-branch { position: relative; padding-top: 40px; }

.vp-card {

/* ============================================================
   THE COLLEAGUE LIFECYCLE WHEEL — the main anchor
   ============================================================ */
.wheel-spread {
  padding: 72px 32px 96px;
  text-align: center;
  max-width: 1200px;
  margin: 0 auto;
}
.wheel-wrap {
  position: relative;
  width: 100%;
  max-width: 620px;
  margin: 40px auto 32px;

.wheel-svg { width: 100%; height: 100%; display: block; }
.wheel-slice { cursor: pointer; transition: opacity 0.18s, transform 0.18s; transform-origin: center; transform-box: fill-box; }

.wheel-legend {

}
.wheel-legend-item {

}
.wheel-legend-item:hover { color: var(--gold-deep); }
.line-icon { width: 26px; height: 26px; display: block; }
.wheel-legend-item .icon { color: var(--gold-deep); margin-bottom: 12px; opacity: 0.9; transition: opacity 0.15s; }
.wheel-legend-item:hover .icon { opacity: 1; }
.eyebrow-icon { display: inline-block; vertical-align: middle; margin-right: 10px; color: var(--gold-hair); }
.eyebrow-icon .line-icon { width: 20px; height: 20px; display: inline-block; vertical-align: middle; }
.opener-icon { display: inline-block; vertical-align: middle; margin-right: 12px; color: rgba(247,244,238,0.9); }
.opener-icon .line-icon { width: 22px; height: 22px; display: inline-block; vertical-align: middle; }
.wheel-legend-item .num { font-family: 'MO Exceptional', serif; font-style: italic; font-size: 0.85rem; color: var(--gold-deep); letter-spacing: 0.14em; margin-bottom: 4px; }
.wheel-legend-item .title { font-family: 'MO Exceptional', serif; font-size: 1.05rem; color: var(--ink); font-weight: 500; }
.wheel-legend-item .desc {

}
@media (hover: hover) {
  .wheel-legend-item:hover .desc { max-height: 120px; opacity: 1; margin-top: 6px; }
}
.wheel-legend-item.open .desc { max-height: 120px; opacity: 1; margin-top: 6px; }
.wheel-legend-item.open .title { color: var(--gold-deep); }

/* ============================================================
   SUB-CHAPTER LAYOUT (within Chapter III)
   ============================================================ */
.sub-hero {
  position: relative;
  height: 480px;
  overflow: hidden;
  margin-bottom: 64px;
}
.sub-hero-img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.sub-hero-caption {

}
.sub-hero-caption .letter {

}
.sub-hero-caption .title-block { flex: 1; }
.sub-hero-caption .eyebrow { font-family: 'Avenir Next LT Pro', sans-serif; font-size: 0.65rem; letter-spacing: 0.32em; text-transform: uppercase; color: rgba(255,255,255,0.85); margin-bottom: 10px; }
.sub-hero-caption h2 { color: #fff; font-family: 'MO Exceptional', serif; font-size: 3rem; font-weight: 500; line-height: 1; letter-spacing: -0.015em; margin-bottom: 12px; }
.sub-hero-caption .sub-lede { font-family: 'Avenir Next LT Pro', sans-serif; font-style: italic; font-size: 1.15rem; color: rgba(255,255,255,0.92); max-width: 560px; }

.philosophy-block {
  max-width: 720px; margin: 0 auto 64px; text-align: center;
}
.philosophy-block .eyebrow { font-family: 'Avenir Next LT Pro', sans-serif; font-size: 0.65rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 20px; }
.philosophy-block .rule { width: 30px; height: 1px; background: var(--gold-hair); margin: 0 auto 24px; }
.philosophy-block p { font-family: 'Avenir Next LT Pro', sans-serif; font-style: italic; font-size: 1.35rem; color: var(--ink); line-height: 1.5; }

/* Policy sections within a sub-chapter */
.policy-section { margin-bottom: 56px; }
.policy-section-header {
  display: flex; align-items: baseline; gap: 20px;

  padding-bottom: 12px;

  margin: 0;
}

/* Policy chips — the actual resource list */
.policy-list { display: grid; gap: 2px; }
.policy-item {
  display: grid;
  grid-template-columns: 32px 1fr auto;

}
.policy-symbol .line-icon { width: 18px; height: 18px; margin: 0 auto; }
.policy-name {
  font-family: 'MO Exceptional', serif;
  font-size: 0.98rem;
  color: var(--ink);
  font-weight: 500;
  line-height: 1.35;
}
.policy-name-sub {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.06em;
  color: var(--ink-mute);
  margin-top: 3px;
}
.policy-kind {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--ink-mute);
  white-space: nowrap;
}

/* ============================================================
   PURPOSE / SYMBOLS / MISC
   ============================================================ */
.purpose-list { list-style: none; padding: 0; margin: 24px 0 0; }
.purpose-list li {
  padding: 14px 0;
  border-top: 1px solid var(--rule);
  display: grid;
  grid-template-columns: 40px 1fr;
  gap: 16px;
  align-items: baseline;
}
.purpose-list li:last-child { border-bottom: 1px solid var(--rule); }
.purpose-list .num {
  font-family: 'MO Exceptional', serif;
  font-style: italic;
  font-size: 0.9rem;
  color: var(--gold-deep);
  letter-spacing: 0.1em;
}
.purpose-list .txt { font-family: 'Avenir Next LT Pro', sans-serif; font-size: 0.95rem; line-height: 1.65; color: var(--ink-body); }

.symbol-legend {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px 40px;
  margin-top: 32px;
}
.symbol-item {
  display: grid;
  grid-template-columns: 44px 1fr;
  gap: 16px;
  padding: 20px 0;
  border-top: 1px solid var(--rule);
}
.symbol-item .sym { text-align: center; line-height: 1; margin-top: 2px; opacity: 0.85; color: var(--gold-deep); }
.symbol-item .sym .line-icon { width: 22px; height: 22px; margin: 0 auto; }
.symbol-item h4 { font-family: 'MO Exceptional', serif; font-size: 1rem; color: var(--ink); text-transform: none; letter-spacing: 0; margin-bottom: 6px; font-weight: 500; }
.symbol-item p { font-size: 0.82rem; color: var(--ink-mute); margin: 0; line-height: 1.55; }

/* Values grid */
.values-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  margin-top: 32px;
}
.value-block {
  padding: 32px 0;
  border-top: 1px solid var(--gold-hair);
}
.value-block h3 { font-family: 'MO Exceptional', serif; font-size: 1.5rem; font-style: italic; color: var(--ink); margin-bottom: 16px; font-weight: 500; }
.value-block p { font-size: 0.95rem; line-height: 1.7; color: var(--ink-body); }

/* Data callout — for stats / links */
.stat-callout {
  text-align: center;
  padding: 40px 24px;
  margin: 32px 0;
  border-top: 1px solid var(--gold-hair);
  border-bottom: 1px solid var(--gold-hair);
}
.stat-callout .stat-num { font-family: 'MO Exceptional', serif; font-size: 3.5rem; font-weight: 500; color: var(--ink); line-height: 1; }
.stat-callout .stat-label { font-family: 'Avenir Next LT Pro', sans-serif; font-size: 0.7rem; letter-spacing: 0.26em; text-transform: uppercase; color: var(--ink-mute); margin-top: 12px; }

/* ============================================================
   VISUAL CONTENTS MENU — photo cards
   ============================================================ */
.menu-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 28px;
  margin-top: 48px;
}
.menu-card {
  display: block;
  text-align: left;
  background: var(--paper);
  border: 1px solid var(--rule);
  transition: border-color 0.2s ease, box-shadow 0.25s ease, transform 0.25s ease;
}
.menu-card:hover {
  border-color: var(--gold-hair);
  box-shadow: var(--shadow-card);
  transform: translateY(-3px);
}
.menu-card-img {
  overflow: hidden;
  aspect-ratio: 16/10;
  background: var(--paper-tint);
}
.menu-card-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.6s ease;
}
.menu-card:hover .menu-card-img img { transform: scale(1.04); }
.menu-card-body { padding: 22px 24px 26px; }
.menu-card-eyebrow {
  display: flex; align-items: center;
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin-bottom: 10px;
}
.menu-card-icon { display: inline-flex; margin-right: 10px; color: var(--gold-deep); }
.menu-card-icon .line-icon { width: 18px; height: 18px; }
.menu-card-title {
  font-family: 'MO Exceptional', serif;
  font-size: 1.25rem;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: 8px;
}
.menu-card-desc {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.8rem;
  color: var(--ink-mute);
  line-height: 1.55;
}
/* Cover CTA — into the visual contents menu */
.cover-cta {
  display: inline-flex; align-items: center; gap: 10px;
  margin-top: 28px;
  padding: 14px 26px;
  border: 1px solid rgba(247,244,238,0.55);
  color: #f7f4ee;
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.68rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  transition: background 0.2s, border-color 0.2s, color 0.2s;
}
.cover-cta:hover { background: rgba(247,244,238,0.12); border-color: var(--gold-hair); color: #fff; }

/* Floating "back to contents" button */
.menu-fab {
  position: fixed;
  right: 28px; bottom: 28px;
  z-index: 400;
  display: flex; align-items: center; gap: 9px;
  padding: 12px 20px;
  background: var(--ink);
  color: #f2ead9;
  border: 1px solid rgba(201,168,121,0.45);
  border-radius: 999px;
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.66rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  box-shadow: 0 6px 24px rgba(13,11,8,0.22);
  transition: background 0.2s, color 0.2s, opacity 0.25s, transform 0.25s;
}
.menu-fab:hover { background: #000; color: var(--gold-hair); }
.menu-fab.hidden { opacity: 0; pointer-events: none; transform: translateY(8px); }

/* Heritage timeline — vertical gold spine with milestone nodes */
.timeline {
  position: relative;
  padding: 8px 0 8px 40px;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 11px; top: 0; bottom: 0;
  width: 1px;
  background: linear-gradient(180deg, transparent 0%, var(--gold-hair) 8%, var(--gold-hair) 92%, transparent 100%);
}
.timeline-item {
  position: relative;
  padding: 26px 0;
}
.timeline-item + .timeline-item { border-top: 1px solid var(--rule); }
.timeline-node {
  position: absolute;
  left: -33px; top: 44px;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--paper);
  border: 1px solid var(--gold-deep);
}
.timeline-node::after {
  content: '';
  position: absolute;
  inset: 2.5px;
  border-radius: 50%;
  background: var(--gold-deep);
}
.timeline-year {
  font-family: 'MO Exceptional', serif;
  font-size: 2.6rem;
  font-weight: 500;
  color: var(--ink);
  line-height: 1;
}
.timeline-label {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.68rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin-top: 10px;
}
.timeline-note {
  font-family: 'Avenir Next LT Pro', sans-serif;
  font-size: 0.85rem;
  font-style: italic;
  color: var(--ink-mute);
  line-height: 1.6;
  margin-top: 8px;
  max-width: 380px;
}

/* Chapter navigator (bottom of each chapter) */
.chapter-nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 40px 80px 80px;
  border-top: 1px solid var(--rule);
  gap: 24px;
  max-width: 1200px;
  margin: 40px auto 0;
}
.nav-btn {
  border: none; background: transparent; text-align: left; padding: 0; cursor: pointer;
  color: var(--ink-body);
  transition: color 0.15s;
}
.nav-btn:hover { color: var(--gold-deep); }
.nav-btn.right { text-align: right; }
.nav-btn .eyebrow { font-family: 'Avenir Next LT Pro', sans-serif; font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 8px; }
.nav-btn .title { font-family: 'MO Exceptional', serif; font-size: 1.15rem; font-weight: 500; }

/* Utility */
.center { text-align: center; }
.mt-32 { margin-top: 32px; }
.mt-48 { margin-top: 48px; }
.mt-64 { margin-top: 64px; }
.mb-32 { margin-bottom: 32px; }

/* Highlight from search */
mark {
  background: linear-gradient(180deg, transparent 55%, rgba(201, 168, 121, 0.35) 55%);

}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 1100px) {
  .spread { padding: 56px 48px; }
  .cols-2 { gap: 32px; }
  .wheel-legend { grid-template-columns: repeat(2, 1fr); }
  .menu-grid { grid-template-columns: 1fr; }
  .cpo-spread { grid-template-columns: 320px 1fr; gap: 40px; }
  .leaders-grid { grid-template-columns: repeat(4, 1fr); }
}
@media (max-width: 900px) {
  .topbar { grid-template-columns: 1fr auto; }
  .running-header { display: none; }
  .layout { grid-template-columns: 1fr; }
  .rail {
    position: fixed;
    top: 66px;
    left: 0; width: 280px;
    height: calc(100vh - 66px);
    transform: translateX(-100%);
    transition: transform 0.25s;
    z-index: 90;
    box-shadow: var(--shadow-card);
  }
  .rail.on { transform: none; }
  .rail-toggle {
    display: flex;
    align-items: center; justify-content: center;
    width: 36px; height: 36px;
    border: 1px solid var(--rule);
    background: var(--paper);
    border-radius: 2px;
  }
  .cpo-spread { grid-template-columns: 1fr; gap: 32px; }
  .cpo-portrait-wrap { max-width: 300px; margin: 0 auto; }
  .cols-2 { grid-template-columns: 1fr; }
  .leaders-grid { grid-template-columns: repeat(3, 1fr); }
  .vp-branches { grid-template-columns: 1fr; gap: 40px; }
  .vp-branches::before { display: none; }
  .vp-branch::before { display: none; }
  .symbol-legend { grid-template-columns: 1fr; }
  .values-grid { grid-template-columns: 1fr; gap: 0; }
  .spread { padding: 40px 24px; }
  .opener-content { padding: 32px 24px; }
  .sub-hero-caption { left: 24px; right: 24px; bottom: 24px; flex-direction: column; align-items: flex-start; }
  .sub-hero-caption .letter { font-size: 3rem; }
  .sub-hero-caption h2 { font-size: 2rem; }
  .chapter-nav { padding: 32px 24px 48px; }
  .search { width: 180px; }
}
@media (min-width: 901px) { .rail-toggle { display: none; } }

@media (max-width: 560px) {
  .brand-sub, .brand-title { display: none; }
  .leaders-grid { grid-template-columns: repeat(2, 1fr); }
  .bookmark-btn span { display: none; }
  .opener-title { font-size: 2.4rem; }
  .search { width: 140px; }
  .search-hint { display: none; }
}

/* Print (hint) */
@media print {
  .topbar, .rail, .chapter-nav, .progress-bar { display: none; }
  .chapter { display: block !important; page-break-after: always; }
}
